<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baixe o App Kihap! - Kihap Martial Arts</title>
    
    <link rel="icon" href="/imgs/favicon.png" type="image/png">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        :root {
            --bg-color: #f3f3f3;
            --primary-yellow: #FFB300;
            --text-dark: #111111;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 24px 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Neue Machina', sans-serif;
        }

        .app-title {
            font-size: 3.5rem;
            line-height: 1;
            letter-spacing: -0.02em;
            color: var(--text-dark);
            font-weight: 900;
        }

        @media (max-width: 768px) {
            .app-title {
                font-size: 2.8rem;
            }
        }

        .download-btn {
            background-color: var(--primary-yellow);
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 16px rgba(255, 179, 0, 0.25);
        }

        .download-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 12px 20px rgba(255, 179, 0, 0.35);
        }

        .mockup-section {
            position: relative;
            width: 100%;
            height: 480px;
            margin-top: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
        }

        .mockup-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .iphone-mockup {
            width: 210px;
            flex-shrink: 0;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.12));
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .iphone-mockup.side-left {
            position: absolute;
            left: -20px;
            top: 60px;
            transform: scale(0.85) rotate(-12deg);
            z-index: 5;
            opacity: 0.9;
        }

        .iphone-mockup.main {
            position: relative;
            z-index: 10;
            transform: scale(1) translateY(0);
        }

        .iphone-mockup.side-right {
            position: absolute;
            right: -20px;
            top: 40px;
            transform: scale(0.85) rotate(10deg);
            z-index: 5;
            opacity: 0.9;
        }

        .floating {
            animation: floating 6s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .store-badge {
            height: 44px;
            transition: transform 0.2s;
        }

        .store-badge:hover {
            transform: translateY(-2px);
        }

        /* Animations */
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        .phone-screen {
            background: white;
            border-radius: 2rem;
            overflow: hidden;
            border: 6px solid #1a1a1a;
            aspect-ratio: 9/19;
            width: 100%;
            position: relative;
        }

        .main .phone-screen {
            border-width: 8px;
            border-radius: 2.5rem;
        }
    </style>
</head>

<body>
    <main class="flex-1 flex flex-col items-center justify-start pt-12 px-6 max-w-lg mx-auto w-full">
        <!-- Text Content -->
        <div class="w-full text-left mb-4">
            <h1 class="app-title font-title fade-in-up">
                Baixe o<br>
                App Kihap!
            </h1>
            
            <!-- Download Button (Arrow) -->
            <div class="mt-6 fade-in-up delay-1">
                <a href="#downloads" class="download-btn">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>
            </div>
        </div>

        <!-- Mockups Section -->
        <div class="mockup-section fade-in-up delay-2">
            <div class="mockup-container">
                <!-- Left Phone -->
                <div class="iphone-mockup side-left">
                    <div class="phone-screen bg-[#f8f7f4]">
                        <div class="p-4 pt-10 flex flex-col items-center">
                            <img src="imgs/logo.png" alt="" class="w-16 mb-6 opacity-20">
                            <div class="w-full h-6 bg-gray-100 rounded mb-3"></div>
                            <div class="w-full h-6 bg-gray-100 rounded mb-3"></div>
                            <div class="w-full h-10 bg-blue-500/20 rounded-lg"></div>
                        </div>
                    </div>
                </div>

                <!-- Main Phone -->
                <div class="iphone-mockup main floating">
                    <div class="phone-screen bg-white">
                        <!-- Screen Content -->
                        <div class="h-full w-full flex flex-col px-6 pt-12">
                            <div class="flex flex-col items-center mb-8">
                                <img src="imgs/logo.png" alt="Kihap Logo" class="w-24 mb-1">
                                <span class="text-[8px] text-gray-300 font-bold tracking-widest uppercase">Martial Arts</span>
                            </div>
                            
                            <div class="space-y-4">
                                <div class="space-y-1">
                                    <div class="w-full h-10 bg-gray-50 border border-gray-100 rounded-lg px-3 flex items-center">
                                        <span class="text-[10px] text-gray-300">seu@email.com</span>
                                    </div>
                                </div>
                                
                                <div class="space-y-1">
                                    <div class="w-full h-10 bg-gray-50 border border-gray-100 rounded-lg px-3 flex items-center">
                                        <span class="text-[10px] text-gray-300">Sua senha</span>
                                    </div>
                                </div>
                                
                                <button class="w-full h-10 bg-[#2563EB] text-white font-bold rounded-lg shadow-lg shadow-blue-500/20 uppercase text-[10px] tracking-wider">
                                    Entrar
                                </button>
                                
                                <div class="text-center pt-2">
                                    <p class="text-[9px] text-gray-400">Ainda não tem conta? <span class="text-blue-600 font-bold">Cadastre-se</span></p>
                                </div>
                            </div>
                            
                            <div class="absolute bottom-4 left-0 right-0 text-center">
                                <p class="text-[7px] text-gray-300 uppercase tracking-widest">© 2024 KIHAP MARTIAL ARTS</p>
                            </div>
                        </div>
                        <!-- Dynamic Island -->
                        <div class="absolute top-3 left-1/2 -translate-x-1/2 w-16 h-4 bg-black rounded-full"></div>
                    </div>
                </div>

                <!-- Right Phone -->
                <div class="iphone-mockup side-right">
                    <div class="phone-screen bg-[#f8f7f4]">
                         <div class="p-4 pt-10 flex flex-col items-center">
                            <img src="imgs/logo.png" alt="" class="w-16 mb-6 opacity-20">
                            <div class="w-full h-6 bg-gray-100 rounded mb-3"></div>
                            <div class="w-full h-6 bg-gray-100 rounded mb-3"></div>
                            <div class="w-full h-10 bg-blue-500/20 rounded-lg"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Download Links -->
        <div id="downloads" class="w-full flex flex-col items-center gap-6 mt-4 mb-12 fade-in-up delay-3">
            <h2 class="font-title text-sm text-gray-400 uppercase tracking-[0.2em]">Disponível em</h2>
            <div class="flex justify-center gap-4">
                <a href="https://apps.apple.com/br/app/kihap/id6761770657" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" alt="App Store" class="store-badge">
                </a>
                <a href="https://play.google.com/store/apps/details?id=com.kihap.app" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play" class="store-badge">
                </a>
            </div>
            
            <a href="index.html" class="mt-4 text-gray-400 hover:text-gray-600 text-[10px] font-bold uppercase tracking-widest transition-colors">
                Voltar para o site &rarr;
            </a>
        </div>
    </main>
</body>

</html>
