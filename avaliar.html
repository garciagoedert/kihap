<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avaliação de Satisfação - Kihap Martial Arts</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #000; color: #fff; }
        
        .step { 
            display: none; 
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }
        .step.active { 
            display: block; 
            opacity: 1;
            transform: translateY(0);
        }

        /* Premium glassmorphism effects */
        .glass-card {
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Star rating hover styling */
        .star-rating i {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.15s ease;
        }
        .star-rating i:hover {
            transform: scale(1.25);
        }

        /* Option cards */
        .option-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-card:hover {
            background-color: rgba(234, 179, 8, 0.08);
            border-color: rgba(234, 179, 8, 0.3);
            transform: translateY(-2px);
        }
        .option-card.selected {
            background-color: rgba(234, 179, 8, 0.15);
            border-color: #eab308;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.15);
        }

        /* NPS btn */
        .nps-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .nps-btn:hover { transform: translateY(-2px); }
        .nps-btn.selected { background-color: #eab308; color: #000; border-color: #eab308; box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); }

        /* Custom inputs */
        input, select, textarea {
            background-color: #121212 !important;
            border-color: #262626 !important;
            color: white !important;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #eab308 !important;
            box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.2) !important;
            outline: none !important;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-black min-h-screen flex flex-col items-center justify-center p-4 relative overflow-x-hidden">

    <!-- Background glow design -->
    <div class="absolute w-[400px] h-[400px] bg-yellow-500/10 rounded-full blur-[120px] top-1/4 -left-1/4 pointer-events-none"></div>
    <div class="absolute w-[350px] h-[350px] bg-yellow-600/5 rounded-full blur-[100px] bottom-1/4 -right-1/4 pointer-events-none"></div>

    <!-- Progress bar at top -->
    <div class="fixed top-0 left-0 w-full h-1.5 bg-gray-950 z-50">
        <div id="progress-bar" class="h-full bg-yellow-500 transition-all duration-500 ease-out" style="width: 0%;"></div>
    </div>

    <!-- Main Container -->
    <div id="form-card" class="w-full max-w-xl glass-card rounded-[32px] shadow-2xl relative overflow-hidden z-10 flex flex-col my-8">
        
        <!-- Header -->
        <div class="p-8 text-center border-b border-white/5 bg-gradient-to-b from-white/[0.03] to-transparent">
            <img src="/imgs/favicon.png" alt="Kihap Logo" class="h-10 mx-auto mb-4 drop-shadow-md">
            <h1 id="campaign-title-heading" class="text-xl font-black text-white uppercase tracking-wider">Carregando...</h1>
            <p id="campaign-desc-heading" class="text-gray-400 text-xs mt-1">Carregando perguntas da pesquisa de satisfação...</p>
        </div>

        <!-- Form Content -->
        <div class="p-8 flex-grow flex flex-col justify-center">
            <div id="loading-spinner" class="text-center py-12">
                <i class="fas fa-spinner fa-spin text-4xl text-yellow-500 mb-4"></i>
                <p class="text-gray-400 text-sm">Carregando formulário...</p>
            </div>

            <form id="nps-dynamic-form" onsubmit="return false;" class="space-y-6 hidden">
                <!-- Steps will be generated here -->
            </form>
        </div>
    </div>

    <!-- Success Message Container -->
    <div id="success-card" class="w-full max-w-xl glass-card rounded-[32px] shadow-2xl p-12 text-center relative overflow-hidden z-10 hidden my-8 animate-fade-in">
        <div class="w-20 h-20 bg-green-500/10 border border-green-500/35 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-green-500/5">
            <i class="fas fa-check text-green-500 text-4xl"></i>
        </div>
        <h3 class="text-3xl font-bold text-white mb-3 tracking-tight">Obrigado!</h3>
        <p class="text-neutral-400 max-w-sm mx-auto leading-relaxed">Sua avaliação foi enviada com sucesso. Agradecemos muito por compartilhar a sua opinião!</p>
        <div class="mt-8">
            <a href="https://kihap.com.br" class="inline-block px-8 py-4 bg-yellow-500 hover:bg-yellow-400 text-black font-black uppercase tracking-widest rounded-xl transition-all shadow-lg hover:shadow-yellow-500/10 text-sm">
                Voltar ao site
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, getDocs, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD1WKwAsAicGdRz9cRA2Nvv3LEZve1vZe0",
            authDomain: "intranet-kihap.firebaseapp.com",
            projectId: "intranet-kihap",
            storageBucket: "intranet-kihap.firebasestorage.app",
            messagingSenderId: "1055939458006",
            appId: "1:1055939458006:web:1d67459a0bc0da60cf2a77",
            measurementId: "G-5LP0W3QSVZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const campaignId = params.get('id') || 'regular';

        let campaign = null;
        let stepsMap = {};
        let sortedStepNumbers = [];
        let activeStep = 1;
        let totalSteps = 0;

        async function initNpsForm() {
            try {
                const docSnap = await getDoc(doc(db, "public_config", `nps_campaign_${campaignId}`));
                if (docSnap.exists()) {
                    campaign = docSnap.data();
                }
            } catch (err) {
                console.error("Error fetching campaign:", err);
            }

            // Fallback configurations if Firestore campaign doesn't exist yet
            if (!campaign) {
                if (campaignId === 'experience') {
                    campaign = {
                        id: 'experience',
                        title: 'KIHAP Experience',
                        description: 'Avaliação dos eventos de Graduação, Competições e Seminários.',
                        questions: [
                            { id: "studentName", label: "Qual o seu nome?", type: "text", required: true, step: 1, placeholder: "Escreva seu nome aqui..." },
                            { id: "unitName", label: "Em qual unidade você frequentou o último ciclo de desenvolvimento?", type: "radio", required: true, step: 2, options: ["Asa Sul", "Sudoeste", "Lago Sul", "Online", "Eleva", "Outra"] },
                            { id: "score_pontualidade", label: "Qual nota você atribui a pontualidade do evento?", type: "rating-5", required: true, step: 3 },
                            { id: "score_inscricao", label: "Dê uma nota ao método de inscrições do Experience.", type: "rating-10", required: true, step: 4 },
                            { id: "score_ambiente", label: "De 0 a 10, como você avalia a sua experiência no ambiente físico (Royal Tulip)?", type: "rating-11", required: true, step: 5 },
                            { id: "comment", label: "Quer deixar algum comentário ou sugestão adicional?", type: "text-area", required: false, step: 6, placeholder: "Escreva sua mensagem aqui..." }
                        ]
                    };
                } else {
                    campaign = {
                        id: 'regular',
                        title: 'Pesquisa Regular (Alunos)',
                        description: 'Net Promoter Score para satisfação regular dos alunos das unidades.',
                        questions: [
                            { id: "studentName", label: "Nome Completo", type: "text", required: true, step: 1, placeholder: "Digite seu nome" },
                            { id: "contact", label: "WhatsApp ou E-mail", type: "text", required: true, step: 1, placeholder: "(00) 00000-0000 ou email@exemplo.com" },
                            { id: "unitId", label: "Sua Unidade", type: "select-unit", required: true, step: 1 },
                            { id: "professorId", label: "Professor(a)", type: "select-professor", required: true, step: 1 },
                            { id: "score", label: "Em uma escala de 0 a 10, o quanto você recomendaria a Kihap para um amigo ou familiar?", type: "rating-11", required: true, step: 2 },
                            { id: "score_estrutura", label: "Estrutura da Unidade", type: "rating-11", required: true, step: 3 },
                            { id: "score_limpeza", label: "Limpeza e Higiene", type: "rating-11", required: true, step: 3 },
                            { id: "score_materiais", label: "Qualidade dos Materiais", type: "rating-11", required: true, step: 3 },
                            { id: "score_atendimento", label: "Atendimento na Recepção", type: "rating-11", required: true, step: 3 },
                            { id: "score_instructor", label: "Performance do Instrutor / Aula", type: "rating-11", required: true, step: 3 },
                            { id: "comment", label: "Comentários Adicionais (Opcional)", type: "text-area", required: false, step: 3, placeholder: "Conte-nos um pouco mais sobre sua nota..." }
                        ]
                    };
                }
            }

            document.getElementById('campaign-title-heading').textContent = campaign.title;
            document.getElementById('campaign-desc-heading').textContent = campaign.description || '';

            // Group questions by step
            stepsMap = {};
            campaign.questions.forEach(q => {
                const sNum = q.step || 1;
                if (!stepsMap[sNum]) stepsMap[sNum] = [];
                stepsMap[sNum].push(q);
            });
            sortedStepNumbers = Object.keys(stepsMap).map(Number).sort((a, b) => a - b);
            totalSteps = sortedStepNumbers.length;

            compileForm();
            prefillFromURL();

            document.getElementById('loading-spinner').classList.add('hidden');
            document.getElementById('nps-dynamic-form').classList.remove('hidden');

            updateProgressBar();
        }

        function compileForm() {
            const form = document.getElementById('nps-dynamic-form');
            form.innerHTML = '';
            
            sortedStepNumbers.forEach((stepNum, idx) => {
                const stepQuestions = stepsMap[stepNum];
                const stepDiv = document.createElement('div');
                stepDiv.id = `step-${idx + 1}`;
                stepDiv.className = `step ${idx === 0 ? 'active' : ''} space-y-6`;
                
                let questionsHtml = '';
                stepQuestions.forEach(q => {
                    questionsHtml += renderQuestion(q);
                });
                
                const isFirst = idx === 0;
                const isLast = idx === sortedStepNumbers.length - 1;
                
                const buttonsHtml = `
                    <div class="flex gap-4 pt-4">
                        ${!isFirst ? `<button type="button" onclick="prevStep(${idx + 1})" class="flex-1 bg-white/5 hover:bg-white/10 text-neutral-400 hover:text-white py-4 rounded-2xl transition-all flex items-center justify-center gap-2"><i class="fas fa-arrow-left"></i> Voltar</button>` : ''}
                        ${isLast ? 
                            `<button type="button" id="submit-btn" onclick="submitForm()" class="flex-[3] bg-yellow-500 hover:bg-yellow-400 text-black font-black uppercase py-4 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2">Finalizar e Enviar</button>` : 
                            `<button type="button" onclick="nextStep(${idx + 1})" class="flex-[3] bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-4 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2">Continuar <i class="fas fa-arrow-right text-xs"></i></button>`
                        }
                    </div>
                `;
                
                stepDiv.innerHTML = `
                    <div class="space-y-6">
                        ${questionsHtml}
                    </div>
                    ${buttonsHtml}
                `;
                form.appendChild(stepDiv);
            });
        }

        function renderQuestion(q) {
            const reqStar = q.required ? '<span class="text-yellow-500 ml-1">*</span>' : '';
            let bodyHtml = '';

            if (q.type === 'text') {
                bodyHtml = `
                    <input type="text" id="q-${q.id}" ${q.required ? 'required' : ''} placeholder="${q.placeholder || 'Digite aqui...'}" 
                        class="w-full bg-[#121212] border border-neutral-800 rounded-2xl px-5 py-4 text-white focus:outline-none transition-all placeholder-neutral-600 text-base">
                `;
            } else if (q.type === 'text-area') {
                bodyHtml = `
                    <textarea id="q-${q.id}" ${q.required ? 'required' : ''} rows="3" placeholder="${q.placeholder || 'Escreva aqui...'}" 
                        class="w-full bg-[#121212] border border-neutral-800 rounded-2xl px-5 py-4 text-white focus:outline-none transition-all placeholder-neutral-600 text-base resize-none"></textarea>
                `;
            } else if (q.type === 'select-unit') {
                bodyHtml = `
                    <select id="q-${q.id}" ${q.required ? 'required' : ''} class="w-full bg-[#121212] border border-neutral-800 rounded-2xl px-5 py-4 text-white focus:outline-none transition-all">
                        <option value="">Selecione a unidade</option>
                        <option value="centro">Unidade Centro</option>
                        <option value="coqueiros">Unidade Coqueiros</option>
                        <option value="asa-sul">Unidade Asa Sul</option>
                        <option value="sudoeste">Unidade Sudoeste</option>
                        <option value="lago-sul">Unidade Lago Sul</option>
                        <option value="noroeste">Unidade Noroeste</option>
                        <option value="dourados">Unidade Dourados</option>
                        <option value="santa-monica">Unidade Santa Mônica</option>
                        <option value="jardim-botanico">Unidade Jardim Botânico</option>
                    </select>
                `;
            } else if (q.type === 'select-professor') {
                bodyHtml = `
                    <select id="q-${q.id}" ${q.required ? 'required' : ''} class="w-full bg-[#121212] border border-neutral-800 rounded-2xl px-5 py-4 text-white focus:outline-none transition-all">
                        <option value="">Carregando professores...</option>
                    </select>
                `;
                setTimeout(() => loadProfessorsForSelect(`q-${q.id}`), 0);
            } else if (q.type === 'rating-5') {
                bodyHtml = `
                    <div class="flex justify-center py-2">
                        <div class="flex gap-4 star-rating" data-stars="5" id="stars-${q.id}">
                            <i class="far fa-star text-4xl text-neutral-600 cursor-pointer" data-val="1"></i>
                            <i class="far fa-star text-4xl text-neutral-600 cursor-pointer" data-val="2"></i>
                            <i class="far fa-star text-4xl text-neutral-600 cursor-pointer" data-val="3"></i>
                            <i class="far fa-star text-4xl text-neutral-600 cursor-pointer" data-val="4"></i>
                            <i class="far fa-star text-4xl text-neutral-600 cursor-pointer" data-val="5"></i>
                        </div>
                    </div>
                    <input type="hidden" id="q-${q.id}" ${q.required ? 'required' : ''}>
                `;
                setTimeout(() => setupStarRating(`stars-${q.id}`, `q-${q.id}`), 0);
            } else if (q.type === 'rating-10') {
                bodyHtml = `
                    <div class="flex flex-wrap justify-center gap-2 py-2 star-rating" data-stars="10" id="stars-${q.id}">
                        <i class="far fa-star text-3xl text-neutral-600 cursor-pointer" data-val="1"></i>
                        <i class="far fa-star text-3xl text-neutral-600 cursor-pointer" data-val="2"></i>
                        <i class="far fa-star text-3xl text-neutral-600 cursor-pointer" data-val="3"></i>
                        <i class="far fa-star text-3xl text-neutral-600 cursor-pointer" data-val="4"></i>
                        <i class="far fa-star text-3xl text-neutral-600 cursor-pointer" data-val="5"></i>
                        <i class="far fa-star text-3xl text-neutral-600 cursor-pointer" data-val="6"></i>
                        <i class="far fa-star text-3xl text-neutral-600 cursor-pointer" data-val="7"></i>
                        <i class="far fa-star text-3xl text-neutral-600 cursor-pointer" data-val="8"></i>
                        <i class="far fa-star text-3xl text-neutral-600 cursor-pointer" data-val="9"></i>
                        <i class="far fa-star text-3xl text-neutral-600 cursor-pointer" data-val="10"></i>
                    </div>
                    <input type="hidden" id="q-${q.id}" ${q.required ? 'required' : ''}>
                `;
                setTimeout(() => setupStarRating(`stars-${q.id}`, `q-${q.id}`), 0);
            } else if (q.type === 'rating-11') {
                bodyHtml = `
                    <div class="grid grid-cols-6 sm:grid-cols-11 gap-1.5 py-2" id="nps-group-${q.id}">
                        ${Array.from({ length: 11 }).map((_, i) => `
                            <button type="button" data-score="${i}" class="nps-btn h-12 flex items-center justify-center rounded-xl bg-gray-900 border border-neutral-800 text-neutral-400 font-bold hover:border-yellow-500">${i}</button>
                        `).join('')}
                    </div>
                    <input type="hidden" id="q-${q.id}" ${q.required ? 'required' : ''}>
                `;
                setTimeout(() => setupNpsButtons(`nps-group-${q.id}`, `q-${q.id}`), 0);
            } else if (q.type === 'radio') {
                const options = q.options || [];
                bodyHtml = `
                    <div class="grid grid-cols-2 gap-3" id="radio-group-${q.id}">
                        ${options.map(opt => `
                            <button type="button" data-val="${opt}" class="option-card border border-neutral-800 bg-[#0d0d0d] p-4 rounded-xl text-left font-semibold text-neutral-300 hover:text-white flex items-center gap-3">
                                <span class="w-5 h-5 rounded-full border border-neutral-700 flex items-center justify-center shrink-0"><span class="w-2.5 h-2.5 rounded-full bg-yellow-500 hidden"></span></span>
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div id="custom-container-${q.id}" class="hidden mt-3">
                        <input type="text" id="custom-val-${q.id}" placeholder="Especifique aqui..." 
                            class="w-full bg-[#121212] border border-neutral-800 rounded-2xl px-5 py-4 text-white focus:outline-none transition-all placeholder-neutral-600">
                    </div>
                    <input type="hidden" id="q-${q.id}" ${q.required ? 'required' : ''}>
                `;
                setTimeout(() => setupRadioGroup(`radio-group-${q.id}`, `q-${q.id}`, `custom-container-${q.id}`, `custom-val-${q.id}`), 0);
            }

            return `
                <div class="space-y-3">
                    <label class="block text-md font-bold text-white leading-snug">${q.label}${reqStar}</label>
                    ${q.description ? `<p class="text-neutral-400 text-xs">${q.description}</p>` : ''}
                    <div class="mt-1">${bodyHtml}</div>
                </div>
            `;
        }

        async function loadProfessorsForSelect(selectId) {
            const select = document.getElementById(selectId);
            if (!select) return;
            try {
                const q = query(collection(db, 'users'), where('isInstructor', '==', true), orderBy('name'));
                const snap = await getDocs(q);
                
                select.innerHTML = '<option value="">Selecione o professor</option>';
                
                const blacklist = ['Admin', 'Financeiro', 'Suporte', 'Teste', 'Kihap', 'Unidade', 'Store'];
                const titles = ['Mr.', 'Mrs.', 'Ms.', 'Sra.', 'Srta.', 'Prof.', 'Professor', 'Master', 'Guro'];
                
                snap.forEach(doc => {
                    const data = doc.data();
                    const name = data.name || '';
                    const lowerName = name.toLowerCase();
                    
                    if (blacklist.some(u => lowerName.includes(u.toLowerCase()))) return;
                    const hasTitle = titles.some(t => name.includes(t));
                    
                    if (hasTitle) {
                        const opt = document.createElement('option');
                        opt.value = doc.id;
                        opt.textContent = name;
                        select.appendChild(opt);
                    }
                });
            } catch (error) {
                console.error("Error loading teachers:", error);
                select.innerHTML = '<option value="">Erro ao carregar</option>';
            }
        }

        function setupStarRating(containerId, inputId) {
            const container = document.getElementById(containerId);
            const input = document.getElementById(inputId);
            if (!container || !input) return;
            const stars = container.querySelectorAll('i');

            stars.forEach(star => {
                star.addEventListener('mouseenter', () => {
                    const val = parseInt(star.dataset.val);
                    stars.forEach(s => {
                        const sVal = parseInt(s.dataset.val);
                        if (sVal <= val) {
                            s.classList.remove('far', 'text-neutral-600');
                            s.classList.add('fas', 'text-yellow-500');
                        } else {
                            s.classList.remove('fas', 'text-yellow-500');
                            s.classList.add('far', 'text-neutral-600');
                        }
                    });
                });

                container.addEventListener('mouseleave', () => {
                    const activeVal = input.value !== '' ? parseInt(input.value) : -1;
                    stars.forEach(s => {
                        const sVal = parseInt(s.dataset.val);
                        if (sVal <= activeVal) {
                            s.classList.remove('far', 'text-neutral-600');
                            s.classList.add('fas', 'text-yellow-500');
                        } else {
                            s.classList.remove('fas', 'text-yellow-500');
                            s.classList.add('far', 'text-neutral-600');
                        }
                    });
                });

                star.addEventListener('click', () => {
                    const val = parseInt(star.dataset.val);
                    input.value = val;
                    stars.forEach(s => {
                        const sVal = parseInt(s.dataset.val);
                        if (sVal <= val) {
                            s.classList.remove('far', 'text-neutral-600');
                            s.classList.add('fas', 'text-yellow-500');
                        } else {
                            s.classList.remove('fas', 'text-yellow-500');
                            s.classList.add('far', 'text-neutral-600');
                        }
                    });
                });
            });
        }

        function setupNpsButtons(groupId, inputId) {
            const container = document.getElementById(groupId);
            const input = document.getElementById(inputId);
            if (!container || !input) return;
            const buttons = container.querySelectorAll('.nps-btn');

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    input.value = btn.dataset.score;
                });
            });
        }

        function setupRadioGroup(groupId, inputId, customContainerId, customInputId) {
            const container = document.getElementById(groupId);
            const input = document.getElementById(inputId);
            const customContainer = document.getElementById(customContainerId);
            const customInput = document.getElementById(customInputId);
            if (!container || !input) return;
            const buttons = container.querySelectorAll('button');

            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    buttons.forEach(b => {
                        b.classList.remove('selected');
                        b.querySelector('span span').classList.add('hidden');
                    });
                    
                    button.classList.add('selected');
                    button.querySelector('span span').classList.remove('hidden');

                    const val = button.dataset.val;
                    input.value = val;

                    if (val === 'Outra' || val === 'Outro' || val.endsWith('...')) {
                        customContainer.classList.remove('hidden');
                        customInput.focus();
                    } else {
                        customContainer.classList.add('hidden');
                    }
                });
            });
        }

        function prefillFromURL() {
            campaign.questions.forEach(q => {
                const input = document.getElementById(`q-${q.id}`);
                if (!input) return;

                if (params.has(q.id)) {
                    input.value = params.get(q.id);
                } else if (q.id === 'studentName' && params.has('name')) {
                    input.value = params.get('name');
                } else if (q.id === 'contact' && params.has('contact')) {
                    input.value = params.get('contact');
                } else if (q.id === 'unitId' && params.has('unit')) {
                    const unitVal = params.get('unit').toLowerCase().trim();
                    for (let i = 0; i < input.options.length; i++) {
                        const optText = input.options[i].text.toLowerCase();
                        const optVal = input.options[i].value.toLowerCase();
                        if (optVal === unitVal || optText.includes(unitVal) || unitVal.includes(optVal)) {
                            input.selectedIndex = i;
                            break;
                        }
                    }
                }
            });
        }

        function updateProgressBar() {
            const percentage = ((activeStep - 1) / totalSteps) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
        }

        window.nextStep = (stepIdx) => {
            const stepQuestions = stepsMap[sortedStepNumbers[stepIdx - 1]];
            for (const q of stepQuestions) {
                const input = document.getElementById(`q-${q.id}`);
                if (!input) continue;
                
                let val = input.value.trim();
                if (q.type === 'radio' && val === 'Outra') {
                    const customInput = document.getElementById(`custom-val-${q.id}`);
                    if (customInput) val = customInput.value.trim();
                }
                
                if (q.required && !val) {
                    alert(`Por favor, preencha a pergunta: "${q.label}"`);
                    if (q.type === 'text' || q.type === 'text-area') {
                        input.focus();
                    }
                    return;
                }
            }

            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(`step-${stepIdx + 1}`).classList.add('active');
            activeStep = stepIdx + 1;
            updateProgressBar();
        };

        window.prevStep = (stepIdx) => {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(`step-${stepIdx - 1}`).classList.add('active');
            activeStep = stepIdx - 1;
            updateProgressBar();
        };

        window.submitForm = async () => {
            const submitBtn = document.getElementById('submit-btn');
            const originalText = submitBtn.innerHTML;

            const stepQuestions = stepsMap[sortedStepNumbers[activeStep - 1]];
            for (const q of stepQuestions) {
                const input = document.getElementById(`q-${q.id}`);
                if (!input) continue;
                
                let val = input.value.trim();
                if (q.type === 'radio' && val === 'Outra') {
                    const customInput = document.getElementById(`custom-val-${q.id}`);
                    if (customInput) val = customInput.value.trim();
                }

                if (q.required && !val) {
                    alert(`Por favor, preencha a pergunta: "${q.label}"`);
                    return;
                }
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Enviando...';

            const docPayload = {
                campaignId: campaign.id,
                timestamp: serverTimestamp(),
                isExternal: true
            };

            if (campaign.id === 'experience') {
                docPayload.isExperienceEvent = true;
            }

            campaign.questions.forEach(q => {
                const input = document.getElementById(`q-${q.id}`);
                if (!input) return;
                
                let val = input.value.trim();
                
                if (q.type.startsWith('rating-')) {
                    val = parseInt(val);
                }

                if (q.type === 'radio') {
                    if (val === 'Outra' || val === 'Outro' || val.endsWith('...')) {
                        const customInput = document.getElementById(`custom-val-${q.id}`);
                        if (customInput && customInput.value.trim()) {
                            val = customInput.value.trim();
                        }
                    }
                }

                if (!isNaN(val) && q.type.startsWith('rating-')) {
                    docPayload[q.id] = val;
                } else {
                    docPayload[q.id] = val;
                }

                if (q.id === 'studentName') docPayload.studentName = val;
                if (q.id === 'contact') docPayload.contact = val;
                if (q.id === 'comment') docPayload.comment = val;
                if (q.id === 'score') docPayload.score = val;

                if (q.type === 'select-unit') {
                    docPayload.unitId = val;
                    if (input.selectedIndex > 0) {
                        docPayload.unitName = input.options[input.selectedIndex].text;
                    }
                }
                if (q.id === 'unitName') {
                    docPayload.unitName = val;
                }

                if (q.type === 'select-professor') {
                    docPayload.professorId = val;
                    if (input.selectedIndex > 0) {
                        docPayload.professorName = input.options[input.selectedIndex].text;
                    }
                }
            });

            try {
                await addDoc(collection(db, "nps_responses"), docPayload);
                
                document.getElementById('progress-bar').style.width = '100%';
                document.getElementById('form-card').classList.add('hidden');
                document.getElementById('success-card').classList.remove('hidden');
            } catch (err) {
                console.error("Error writing feedback to Firestore:", err);
                alert("Ocorreu um erro ao enviar sua avaliação. Por favor, tente novamente.");
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        };

        // Initialize form
        initNpsForm();
    </script>
</body>
</html>
