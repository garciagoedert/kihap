<!DOCTYPE html>
<html lang="pt-BR" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Permissões de Rede Universais (CSP) para Web e Mobile -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost ws: wss: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; frame-src 'self' https:; connect-src 'self' capacitor://localhost http://localhost ws: wss: https:;">
    
    
    
    
    
    
        
    
    
    <title>Kihap - Feed</title>
    <link rel="icon" href="https://kihap.com.br/wp-content/uploads/2021/02/logo-wh.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class"
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../intranet/theme.css">
    <link rel="stylesheet" href="../intranet/log.css">
    <style>
        body { font-family: 'Inter', sans-serif; overscroll-behavior-y: contain; }
        .ptr-container {
            position: relative;
            z-index: 10;
            margin-top: -60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            pointer-events: none;
        }
        .ptr-spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 193, 7, 0.2);
            border-top-color: #FFC107;
            border-radius: 50%;
            transition: transform 0.1s linear;
        }
        .ptr-refreshing .ptr-spinner {
            animation: ptr-spin 0.8s linear infinite;
        }
        @keyframes ptr-spin {
            to { transform: rotate(360deg); }
        }
        .pull-content {
            transition: transform 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        /* Override inline styles from rich text editor to support light/dark mode */
        .prose * {
            background-color: transparent !important;
        }
        html:not(.dark) .prose * {
            color: inherit !important;
        }
    </style>

    <script>
        // Default to light mode unless explicitly set to dark
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-[#111111] text-gray-900 dark:text-gray-200 transition-colors duration-300">
    <!-- Pull to Refresh Indicator -->
    <div id="ptr-indicator" class="ptr-container">
        <div class="ptr-spinner shadow-lg bg-white dark:bg-[#1e1e1e]"></div>
    </div>
    <div class="relative min-h-screen md:flex">
        <div id="sidebar-container"></div>
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>
        <main id="main-content" class="flex-1">
            <div id="header-container"></div>
            <div class="p-0 md:p-6 lg:p-8 flex justify-center">
                <div class="w-full max-w-2xl">
                    <div class="pt-6 md:pt-8 w-full">
                    <div id="stories-container" class="mb-6 hidden px-4 md:px-0">
                        <div id="stories-bar" class="flex gap-4 py-2 overflow-x-auto no-scrollbar scroll-smooth"></div>
                    </div>

                    <div id="feed-list" class="flex flex-col pb-20 md:pb-0">
                        <!-- As postagens do feed serão carregadas aqui -->
                        <div class="flex justify-center items-center py-10">
                            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-yellow-500"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import { loadComponents } from './js/common-ui.js';
        import { loadFeed } from './js/feed.js';
        import { initPullToRefresh } from './js/pull-to-refresh.js';

        document.addEventListener('DOMContentLoaded', () => {
            loadComponents(() => {
                loadFeed();
                
                // Inicializar Pull to Refresh
                initPullToRefresh(async () => {
                    await loadFeed();
                });
            });
        });
    </script>
</body>
</html>
