<!DOCTYPE html>
<html lang="pt-BR" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Permissões de Rede Universais (CSP) para Web e Mobile -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost ws: wss: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; frame-src 'self' https:; connect-src 'self' capacitor://localhost http://localhost ws: wss: https:;">
    
    
    
    
    
    
        
    
    
    <title>Kihap - Loja</title>
    <link rel="icon" href="https://kihap.com.br/wp-content/uploads/2021/02/logo-wh.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class"
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../intranet/theme.css">
    <link rel="stylesheet" href="../intranet/log.css">
    <style>
        @font-face {
            font-family: 'Neue Machina';
            src: url('../fonte/NeueMachina-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'Neue Machina';
            src: url('../fonte/NEUEMACHINA-ULTRABOLD.OTF') format('opentype');
            font-weight: 900;
            font-style: normal;
        }

        body { font-family: 'Inter', sans-serif; }
        
        .font-neue { font-family: 'Neue Machina', sans-serif; }

        .product-card { 
            position: relative; 
            overflow: hidden; 
            border-radius: 1.25rem; 
            background: white;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .dark .product-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: none;
        }
        .product-card:hover {
            transform: translateY(-6px);
            border-color: #eab308;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .dark .product-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(234, 179, 8, 0.5);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }
        .product-card-img { 
            width: 100%; 
            aspect-ratio: 1/1;
            object-fit: cover; 
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); 
        }
        .product-card:hover .product-card-img { 
            transform: scale(1.1); 
        }
        .product-card-content { 
            padding: 1rem; 
            background: transparent;
        }
    </style>

    <script>
        // Default to light mode unless explicitly set to dark
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-[#111111] text-gray-900 dark:text-gray-200 transition-colors duration-300">
    <div class="relative min-h-screen md:flex">
        <div id="sidebar-container"></div>
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>
        <main id="main-content" class="flex-1">
            <div id="header-container"></div>
            <div class="px-4 py-6 md:px-8 md:py-8 lg:px-12">
                <div class="flex items-center justify-between mb-6">
                    <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter text-gray-900 dark:text-white font-neue">Loja</h1>
                    <div class="flex gap-2">
                        <button class="w-10 h-10 rounded-full bg-gray-100 dark:bg-white/5 flex items-center justify-center text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors border border-gray-200 dark:border-white/5">
                            <i class="fas fa-filter text-sm"></i>
                        </button>
                    </div>
                </div>
                <div id="product-list" class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-6">
                    <!-- Produtos serão carregados aqui -->
                    <div class="col-span-full py-20 text-center">
                        <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-yellow-500 mb-4"></div>
                        <p class="text-gray-500 uppercase tracking-widest text-xs font-bold">Carregando Vitrine...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import { loadComponents } from './js/common-ui.js';
        import { loadProducts } from './js/store.js';
        document.addEventListener('DOMContentLoaded', () => {
            loadComponents(() => {
                loadProducts();
            });
        });
    </script>
</body>
</html>
