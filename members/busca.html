<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buscar Membros - Kihap Social</title>
    <link rel="icon" href="https://kihap.com.br/wp-content/uploads/2021/02/logo-wh.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../intranet/theme.css">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .search-input:focus {
            box-shadow: 0 0 20px rgba(1, 79, 164, 0.3);
            border-color: #014fa4;
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-200 min-h-screen pb-20">
    <div id="sidebar-container"></div>
    <div id="sidebar-backdrop" class="fixed inset-0 bg-black/60 z-[120] hidden"></div>

    <div id="header-container"></div>

    <main id="main-content" class="max-w-xl mx-auto px-4 pt-4">
        <div class="mb-6">
            <h1 class="text-3xl font-extrabold text-white mb-1">Descobrir</h1>
            <p class="text-gray-500 text-sm">Encontre instrutores e membros da Kihap.</p>
        </div>

        <!-- Search Bar -->
        <div class="sticky top-4 z-50 mb-8">
            <div class="relative group">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-blue-500 transition-colors"></i>
                <input type="text" id="search-input" placeholder="Buscar por nome, unidade ou faixa..." 
                    class="w-full bg-[#1a1a1a] border border-gray-800 rounded-2xl py-4 pl-12 pr-4 text-white focus:outline-none search-input transition-all">
            </div>
        </div>

        <!-- Filters/Tags -->
        <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-4">
            <button class="filter-tag active px-4 py-1.5 bg-blue-600 text-white text-xs font-bold rounded-full whitespace-nowrap transition-all" data-filter="all">Todos</button>
            <button class="filter-tag px-4 py-1.5 bg-white/5 text-gray-400 text-xs font-bold rounded-full whitespace-nowrap hover:bg-white/10 transition-all" data-filter="Instrutor">Instrutores</button>
            <button class="filter-tag px-4 py-1.5 bg-white/5 text-gray-400 text-xs font-bold rounded-full whitespace-nowrap hover:bg-white/10 transition-all" data-filter="Preta">Faixas Pretas</button>
        </div>

        <!-- Results List -->
        <div id="results-list" class="space-y-3">
            <!-- Loading Skeletons -->
            <div class="glass-card p-4 rounded-2xl flex items-center gap-4 animate-pulse">
                <div class="w-12 h-12 bg-white/5 rounded-full"></div>
                <div class="flex-1 space-y-2">
                    <div class="h-4 bg-white/5 rounded w-1/3"></div>
                    <div class="h-3 bg-white/5 rounded w-1/4"></div>
                </div>
            </div>
            <div class="glass-card p-4 rounded-2xl flex items-center gap-4 animate-pulse">
                <div class="w-12 h-12 bg-white/5 rounded-full"></div>
                <div class="flex-1 space-y-2">
                    <div class="h-4 bg-white/5 rounded w-1/3"></div>
                    <div class="h-3 bg-white/5 rounded w-1/4"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import { loadComponents } from './js/common-ui.js';
        import { initSearch } from './js/busca.js';

        document.addEventListener('DOMContentLoaded', () => {
            loadComponents(() => {
                initSearch();
            });
        });
    </script>
</body>
</html>
