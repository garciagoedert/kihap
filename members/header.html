<header class="bg-[#1a1a1a] flex items-center justify-between p-4 border-b border-gray-700">
    <button id="sidebar-open-btn" class="p-2 rounded-md text-gray-300 hover:bg-gray-700" aria-label="Open sidebar">
        <i class="fas fa-bars"></i>
    </button>
    <div class="flex items-center justify-center flex-grow">
        <img src="/imgs/favicon.png" alt="Kihap Logo" class="h-10">
    </div>

    <!-- Perfil e Notificações -->
    <div class="flex items-center gap-4 relative">
        <!-- Seção do Perfil -->
        <div class="relative">
            <button id="profile-menu-toggle" class="flex items-center gap-3 p-1 rounded-lg hover:bg-gray-700/50 transition-all duration-200 focus:outline-none">
                <div class="flex flex-col items-end hidden sm:flex">
                    <span id="header-user-name" class="text-sm font-bold text-white leading-tight truncate max-w-[150px]">Carregando...</span>
                    <span id="header-user-unit" class="text-[10px] text-gray-400 uppercase tracking-wider font-medium">Kihap Member</span>
                </div>
                <div class="relative">
                    <img id="header-user-avatar" src="default-profile.svg" alt="Avatar" class="w-10 h-10 rounded-full border-2 border-gray-700 object-cover">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#1a1a1a] rounded-full"></div>
                </div>
                <i class="fas fa-chevron-down text-gray-500 text-xs transition-transform duration-200" id="profile-chevron"></i>
            </button>

            <!-- Menu Dropdown do Perfil -->
            <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-[#1a1a1a] border border-gray-700 rounded-xl shadow-2xl z-50 overflow-hidden transform origin-top-right transition-all duration-200">
                <div class="p-4 border-b border-gray-700 bg-gray-800/30">
                    <p class="text-xs text-gray-400 font-medium uppercase tracking-wider mb-1">Acesso Rápido</p>
                    <p id="dropdown-user-email" class="text-sm text-gray-300 truncate">carregando...</p>
                </div>
                <div class="p-2">
                    <a href="perfil.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-700 hover:text-white transition-colors group">
                        <div class="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center group-hover:bg-blue-500/20">
                            <i class="fas fa-user-circle text-blue-500"></i>
                        </div>
                        <span class="font-medium">Meu Perfil</span>
                    </a>
                    <hr class="my-2 border-gray-700">
                    <button onclick="logout()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-colors group">
                        <div class="w-8 h-8 rounded-lg bg-red-500/10 flex items-center justify-center group-hover:bg-red-500/20">
                            <i class="fas fa-sign-out-alt text-red-500"></i>
                        </div>
                        <span class="font-medium">Sair da Conta</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>
