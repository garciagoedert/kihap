<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Permissões de Rede Universais (CSP) para Web e Mobile -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost ws: wss: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; frame-src 'self' https:; connect-src 'self' capacitor://localhost http://localhost ws: wss: https:;">
    
    
    
    
    
    
        
    
    
    <title>Meus Pedidos - Área do Aluno | Kihap</title>
    <link rel="icon" href="/imgs/favicon.png" type="image/x-icon">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <base href="/members/">
</head>
<body class="bg-[#1a1a1a] text-gray-200 font-roboto min-h-screen flex flex-col md:flex-row">

    <!-- Container do Sidebar (dinâmico) -->
    <div id="sidebar-container" class="z-50"></div>

    <!-- Main Content wrapper -->
    <div class="flex-grow flex flex-col min-w-0 transition-all duration-300 md:ml-64 w-full h-screen overflow-y-auto" id="main-content">
        <!-- Header Container (dinâmico) -->
        <div id="header-container" class="sticky top-0 z-40 bg-zinc-900 border-b border-gray-700/50 shadow-md"></div>

        <!-- Main Content Area -->
        <main class="flex-grow p-4 md:p-8">
            <div class="max-w-5xl mx-auto">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                    <h1 class="text-3xl font-bold text-white flex items-center">
                        <i class="fas fa-shopping-bag text-yellow-500 mr-3"></i> Meus Pedidos
                    </h1>
                </div>

                <div id="loading" class="text-center py-12">
                    <i class="fas fa-circle-notch fa-spin text-4xl text-yellow-500"></i>
                    <p class="mt-4 text-gray-400">Carregando seus pedidos...</p>
                </div>

                <div id="empty-state" class="hidden text-center py-16 bg-gray-800 rounded-xl border border-gray-700 shadow-xl">
                    <i class="fas fa-box-open text-6xl text-gray-600 mb-4"></i>
                    <h2 class="text-2xl font-bold text-white mb-2">Nenhum pedido encontrado</h2>
                    <p class="text-gray-400 mb-6">Você ainda não realizou nenhuma compra na nossa loja.</p>
                    <a href="store.html" class="inline-block bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 px-8 rounded-lg transition-colors">
                        Visitar Loja
                    </a>
                </div>

                <!-- Orders Container -->
                <div id="orders-container" class="hidden space-y-6">
                    <!-- Orders will be injected here via JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-storage-compat.js"></script>
    <!-- Configuração do Firebase e Componentes UI -->
    <script type="module" src="/intranet/firebase-config.js"></script>
    <script type="module" src="js/common-ui.js"></script>
    
    <!-- Lógica da Página -->
    <script type="module" src="js/pedidos.js"></script>
</body>
</html>
