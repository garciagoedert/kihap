<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maio Laranja - Kihap</title>
    
    <link rel="icon" href="https://kihap.com.br/wp-content/uploads/2021/02/logo-wh.png" type="image/png">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .orange-text-gradient {
            background: linear-gradient(90deg, #FF9800, #F44336);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="antialiased bg-[#f8f7f4] text-[#111111]">
    <!-- Header -->
    <div id="header-container"></div>

    <main>
        <!-- Hero Section -->
        <section class="relative py-32 overflow-hidden bg-[#111111] flex items-center justify-center text-center min-h-[50vh]">
            <!-- Decorative Elements -->
            <div class="absolute inset-0 z-0">
                <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-transparent"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-orange-500/10 rounded-full blur-[120px]"></div>
            </div>
            
            <div class="relative z-10 container mx-auto px-6">
                <div class="inline-flex items-center gap-2 mb-6 bg-white/10 backdrop-blur-md border border-white/20 rounded-full px-4 py-2 text-sm font-medium text-white/90 animate-fadeInUp">
                    <span class="w-2 h-2 bg-orange-500 rounded-full animate-pulse"></span>
                    Campanha Oficial
                </div>
                <h1 class="text-5xl md:text-7xl font-black uppercase tracking-tight font-title text-white animate-fadeInUp delay-100">
                    Maio <span class="orange-text-gradient">Laranja</span>
                </h1>
                <p class="mt-6 text-lg md:text-xl max-w-2xl mx-auto text-white/80 leading-relaxed animate-fadeInUp delay-200">
                    Ajude a espalhar essa causa importante. Faça o download das imagens oficiais da nossa campanha Kihap - Maio Laranja.
                </p>
            </div>
        </section>

        <!-- Downloads Grid -->
        <section class="py-24 bg-[#f8f7f4]">
            <div class="container mx-auto px-6">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-5xl mx-auto">
                <!-- Card 1 -->
                <div class="glass-card !rounded-[2rem] overflow-hidden group animate-fadeInUp delay-100">
                    <div class="aspect-square bg-white flex items-center justify-center overflow-hidden relative">
                        <img src="imgs/maiolaranja/WhatsApp Image 2026-05-03 at 12.59.42 (1).jpeg" alt="Maio Laranja - Imagem 1" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                            <i class="fas fa-search-plus text-white text-3xl"></i>
                        </div>
                    </div>
                    <div class="p-8">
                        <a href="imgs/maiolaranja/WhatsApp Image 2026-05-03 at 12.59.42 (1).jpeg" download="Kihap-Maio-Laranja-1.jpeg" class="w-full btn-gradient text-black font-black text-xs uppercase tracking-widest py-4 px-6 rounded-2xl flex items-center justify-center gap-3 shadow-xl hover:shadow-orange-500/30 transition-all">
                            <i class="fas fa-cloud-download-alt text-lg"></i> Download Imagem 1
                        </a>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="glass-card !rounded-[2rem] overflow-hidden group animate-fadeInUp delay-200">
                    <div class="aspect-square bg-white flex items-center justify-center overflow-hidden relative">
                        <img src="imgs/maiolaranja/WhatsApp Image 2026-05-03 at 12.59.42.jpeg" alt="Maio Laranja - Imagem 2" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                            <i class="fas fa-search-plus text-white text-3xl"></i>
                        </div>
                    </div>
                    <div class="p-8">
                        <a href="imgs/maiolaranja/WhatsApp Image 2026-05-03 at 12.59.42.jpeg" download="Kihap-Maio-Laranja-2.jpeg" class="w-full btn-gradient text-black font-black text-xs uppercase tracking-widest py-4 px-6 rounded-2xl flex items-center justify-center gap-3 shadow-xl hover:shadow-orange-500/30 transition-all">
                            <i class="fas fa-cloud-download-alt text-lg"></i> Download Imagem 2
                        </a>
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="glass-card !rounded-[2rem] overflow-hidden group animate-fadeInUp delay-300">
                    <div class="aspect-square bg-white flex items-center justify-center overflow-hidden relative">
                        <img src="imgs/maiolaranja/WhatsApp Image 2026-05-03 at 12.59.43 (1).jpeg" alt="Maio Laranja - Imagem 3" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                            <i class="fas fa-search-plus text-white text-3xl"></i>
                        </div>
                    </div>
                    <div class="p-8">
                        <a href="imgs/maiolaranja/WhatsApp Image 2026-05-03 at 12.59.43 (1).jpeg" download="Kihap-Maio-Laranja-3.jpeg" class="w-full btn-gradient text-black font-black text-xs uppercase tracking-widest py-4 px-6 rounded-2xl flex items-center justify-center gap-3 shadow-xl hover:shadow-orange-500/30 transition-all">
                            <i class="fas fa-cloud-download-alt text-lg"></i> Download Imagem 3
                        </a>
                    </div>
                </div>

                <!-- Card 4 -->
                <div class="glass-card !rounded-[2rem] overflow-hidden group animate-fadeInUp delay-400">
                    <div class="aspect-square bg-white flex items-center justify-center overflow-hidden relative">
                        <img src="imgs/maiolaranja/WhatsApp Image 2026-05-03 at 12.59.43.jpeg" alt="Maio Laranja - Imagem 4" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                            <i class="fas fa-search-plus text-white text-3xl"></i>
                        </div>
                    </div>
                    <div class="p-8">
                        <a href="imgs/maiolaranja/WhatsApp Image 2026-05-03 at 12.59.43.jpeg" download="Kihap-Maio-Laranja-4.jpeg" class="w-full btn-gradient text-black font-black text-xs uppercase tracking-widest py-4 px-6 rounded-2xl flex items-center justify-center gap-3 shadow-xl hover:shadow-orange-500/30 transition-all">
                            <i class="fas fa-cloud-download-alt text-lg"></i> Download Imagem 4
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-container"></div>

    <script src="js/script.js"></script>
</body>

</html>
