<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem("theme") || "light";
            if (theme === "dark") {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        })();
        window.tailwind = { config: { darkMode: "class" } };
    </script>    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Permissões de Rede Universais (CSP) para Web e Mobile -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost ws: wss: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; frame-src 'self' https:; connect-src 'self' capacitor://localhost http://localhost ws: wss: https:;">
    
    
    
    
    
    
        
    
    
    <title>Feed - Intranet Kihap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Quill.js Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="log.css">
    <style>
        .ql-editor { font-size: 16px; min-height: 150px; background: transparent; color: #111827; border-radius: 0 0 1rem 1rem; border: 1px solid rgba(229, 231, 235, 0.5); border-top: none; }
        .dark .ql-editor { background: transparent; color: #e5e7eb; border-color: rgba(75, 85, 99, 0.3) !important; }
        
        .ql-toolbar { background: rgba(249, 250, 251, 0.5); border-color: rgba(229, 231, 235, 0.5) !important; border-radius: 1rem 1rem 0 0; }
        .dark .ql-toolbar { background: rgba(0, 0, 0, 0.2); border-color: rgba(75, 85, 99, 0.3) !important; }

        /* Remove estilos hardcoded vindos do editor rico para não quebrar o layout no modo claro */
        .prose * { background-color: transparent !important; color: inherit !important; }
        
        .ql-container { border-color: rgba(229, 231, 235, 0.5) !important; }
        .dark .ql-container { border-color: rgba(75, 85, 99, 0.3) !important; }
        
        .ql-stroke { stroke: #4b5563 !important; }
        .dark .ql-stroke { stroke: #9ca3af !important; }
        
        .ql-fill { fill: #4b5563 !important; }
        .dark .ql-fill { fill: #9ca3af !important; }
        
        .ql-picker { color: #4b5563 !important; }
        .dark .ql-picker { color: #9ca3af !important; }
        
        .ql-active .ql-stroke { stroke: #3b82f6 !important; }
        .dark .ql-active .ql-stroke { stroke: #FFC107 !important; }
        
        .ql-active .ql-fill { fill: #3b82f6 !important; }
        .dark .ql-active .ql-fill { fill: #FFC107 !important; }
        
        /* Custom formatting for posts */
        .post-text-content { line-height: 1.6; }
        .post-text-content a { color: #FFC107; text-decoration: underline; }
        .post-text-content img { border-radius: 0.75rem; margin-top: 1rem; margin-bottom: 1rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .post-text-content h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem; }
        .post-text-content h2 { font-size: 1.25rem; font-weight: bold; margin-bottom: 0.5rem; }
        .post-text-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .post-text-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#111111] text-gray-900 dark:text-gray-200 transition-colors duration-300">
    <div class="flex h-screen">
        <div id="sidebar-container"></div>
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden"></div>
        <main id="main-content" class="flex-1 flex flex-col h-screen overflow-hidden transition-all duration-300 ease-in-out">
            <div id="header-container"></div>
            <div class="p-6 flex-1 overflow-y-auto">
                <div class="max-w-4xl mx-auto">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4 bg-white/70 dark:bg-[#1a1a1a]/70 backdrop-blur-xl p-6 rounded-2xl border border-gray-100 dark:border-gray-800/50 shadow-sm">
                    <div>
                        <h1 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white">Feed de Conteúdo</h1>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 font-medium">Compartilhe novidades com a rede</p>
                    </div>
                </div>

                <!-- Formulário de Nova Postagem -->
                <div class="bg-white/70 dark:bg-[#1a1a1a]/70 backdrop-blur-xl p-6 md:p-8 rounded-3xl border border-gray-100 dark:border-gray-800/50 shadow-sm mb-10">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6 pb-4 border-b border-gray-200 dark:border-gray-800">
                        <h2 class="text-xl font-bold flex items-center text-gray-900 dark:text-white">
                            <i class="fas fa-edit mr-3 text-primary"></i> 
                            Criar Nova Postagem
                        </h2>
                        
                        <!-- Toggle Modo Story -->
                        <div class="flex items-center gap-3 bg-gray-50 dark:bg-[#252525] p-2 rounded-lg border border-gray-200 dark:border-gray-700">
                            <span class="text-xs font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500">Post Comum</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="story-mode-toggle" class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-300 dark:bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gradient-to-r from-yellow-500 to-red-500"></div>
                            </label>
                            <span class="text-xs font-bold uppercase tracking-wider text-orange-600 dark:text-orange-400">Modo Story</span>
                        </div>
                    </div>

                    <form id="post-form">
                        <div class="mb-6 relative">
                            <label class="block text-gray-400 text-sm font-medium mb-3">O que você quer compartilhar?</label>
                            <div id="editor-wrapper" class="relative">
                                <div id="post-editor"></div>
                                <button type="button" id="emoji-trigger" class="absolute right-3 top-[10px] z-10 text-gray-400 hover:text-primary transition-colors">
                                    <i class="far fa-laugh-beam text-xl"></i>
                                </button>
                            </div>
                        </div>

                        <!-- CTA Button Settings -->
                        <div class="mb-6 bg-gray-50 dark:bg-[#252525] p-4 rounded-lg border border-gray-200 dark:border-gray-700">
                            <button type="button" id="toggle-cta" class="flex items-center text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-primary transition-colors">
                                <i class="fas fa-plus-circle mr-2"></i> Adicionar Botão de Link (Opcional)
                            </button>
                            <div id="cta-fields" class="hidden mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label for="cta-text" class="block text-xs text-gray-500 mb-1">Texto do Botão</label>
                                    <input type="text" id="cta-text" class="w-full bg-white dark:bg-[#333] border border-gray-200 dark:border-gray-600 rounded p-2 text-sm text-gray-900 dark:text-white focus:border-primary outline-none" placeholder="Ex: Saiba Mais">
                                </div>
                                <div>
                                    <label for="cta-url" class="block text-xs text-gray-500 mb-1">URL do Link</label>
                                    <input type="url" id="cta-url" class="w-full bg-white dark:bg-[#333] border border-gray-200 dark:border-gray-600 rounded p-2 text-sm text-gray-900 dark:text-white focus:border-primary outline-none" placeholder="https://...">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-6">
                            <div class="md:col-span-7">
                                <label class="block text-gray-400 text-sm font-medium mb-3 text-left">Mídia em Destaque</label>
                                <div class="flex items-center space-x-4 mb-3">
                                    <label class="flex items-center cursor-pointer group">
                                        <input type="radio" name="media-type" value="upload" checked class="hidden peer">
                                        <div class="w-4 h-4 rounded-full border-2 border-gray-500 peer-checked:border-primary peer-checked:bg-primary mr-2 transition-all"></div>
                                        <span class="text-sm peer-checked:text-gray-900 dark:peer-checked:text-white text-gray-400 transition-colors">Upload</span>
                                    </label>
                                    <label class="flex items-center cursor-pointer group">
                                        <input type="radio" name="media-type" value="url" class="hidden peer">
                                        <div class="w-4 h-4 rounded-full border-2 border-gray-500 peer-checked:border-primary peer-checked:bg-primary mr-2 transition-all"></div>
                                        <span class="text-sm peer-checked:text-gray-900 dark:peer-checked:text-white text-gray-400 transition-colors">Link Externo</span>
                                    </label>
                                </div>

                                <div id="upload-container" class="flex items-center bg-gray-50 dark:bg-[#2a2a2a] border border-gray-200 dark:border-gray-600 rounded-lg p-3 text-sm text-gray-900 dark:text-white focus:ring-1 focus:ring-primary outline-none transition-all cursor-pointer group" onclick="document.getElementById('post-media').click()">
                                    <div class="bg-gray-200 dark:bg-[#3a3a3a] p-2 rounded mr-3 group-hover:bg-primary transition-colors">
                                        <i class="fas fa-cloud-upload-alt text-gray-600 dark:text-gray-300 group-hover:text-black"></i>
                                    </div>
                                    <span id="file-name" class="text-sm text-gray-500 dark:text-gray-400 truncate">Escolher arquivo...</span>
                                    <input type="file" id="post-media" class="hidden">
                                </div>

                                <div id="url-container" class="hidden">
                                    <input type="text" id="media-url" class="w-full bg-gray-50 dark:bg-[#2a2a2a] border border-gray-200 dark:border-gray-600 rounded-lg p-3 text-sm text-gray-900 dark:text-white focus:ring-1 focus:ring-primary outline-none" placeholder="Link YouTube ou Spotify">
                                </div>
                            </div>

                            <div class="md:col-span-12 mb-4">
                                <label class="block text-gray-400 text-sm font-medium mb-3 text-left italic">Para quem é esta postagem?</label>
                                <div class="flex items-center space-x-6">
                                    <label class="flex items-center cursor-pointer">
                                        <input type="radio" name="target-type" value="unit" checked class="hidden peer">
                                        <div class="w-5 h-5 rounded border-2 border-gray-600 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-all">
                                            <i class="fas fa-check text-[10px] text-black hidden peer-checked:block"></i>
                                        </div>
                                        <span class="ml-2 text-sm text-gray-600 dark:text-gray-300">Por Unidade</span>
                                    </label>
                                    <label class="flex items-center cursor-pointer">
                                        <input type="radio" name="target-type" value="students" class="hidden peer">
                                        <div class="w-5 h-5 rounded border-2 border-gray-600 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-all">
                                            <i class="fas fa-check text-[10px] text-black hidden peer-checked:block"></i>
                                        </div>
                                        <span class="ml-2 text-sm text-gray-600 dark:text-gray-300">Alunos Específicos</span>
                                        
                                    </label>
                                </div>
                            </div>

                            <div id="unit-target-container" class="md:col-span-12">
                                <label for="target-unit" class="block text-gray-400 text-xs font-medium mb-2 text-left">Selecione a Unidade</label>
                                <div class="relative max-w-md">
                                    <select id="target-unit" class="w-full bg-gray-50 dark:bg-[#2a2a2a] border border-gray-200 dark:border-gray-600 rounded-lg p-3 text-sm text-gray-900 dark:text-white focus:ring-1 focus:ring-primary outline-none appearance-none cursor-pointer pr-10 transition-all">
                                        <option value="all">Todas as Unidades</option>
                                        <!-- Outras unidades serão carregadas aqui -->
                                    </select>
                                    <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-gray-500">
                                        <i class="fas fa-chevron-down text-xs"></i>
                                    </div>
                                </div>
                            </div>

                            <div id="student-target-container" class="md:col-span-12 hidden">
                                <label class="block text-gray-400 text-xs font-medium mb-2 text-left">Buscar e Selecionar Alunos</label>
                                <div class="relative max-w-xl">
                                    <div class="flex flex-wrap gap-2 p-2 bg-gray-50 dark:bg-[#2a2a2a] border border-gray-200 dark:border-gray-600 rounded-lg min-h-[46px] focus-within:ring-1 focus-within:ring-primary transition-all">
                                        <div id="selected-students-tags" class="flex flex-wrap gap-2"></div>
                                        <input type="text" id="student-search" class="flex-1 bg-transparent border-none outline-none text-sm p-1 min-w-[120px]" placeholder="Digite o nome do aluno...">
                                    </div>
                                    <div id="student-search-results" class="absolute z-50 left-0 right-0 mt-1 bg-white dark:bg-[#2a2a2a] border border-gray-200 dark:border-gray-700 rounded-lg shadow-xl max-h-60 overflow-y-auto hidden">
                                        <!-- Search results will appear here -->
                                    </div>
                                </div>
                                <p class="text-[10px] text-gray-500 mt-1 italic">* O post será visível apenas para os alunos selecionados.</p>
                            </div>
                        </div>

                        <div class="flex justify-end">
                            <button type="submit" class="bg-primary hover:bg-primary-dark text-black font-bold py-3 px-8 rounded-lg transition-all transform hover:scale-105 shadow-lg flex items-center">
                                <i class="fas fa-paper-plane mr-2"></i> Publicar
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Lista de Postagens -->
                <div class="flex items-center mb-6">
                    <h2 class="text-2xl font-bold">Postagens Recentes</h2>
                    <div class="ml-4 h-[2px] flex-1 bg-gradient-to-r from-gray-800 to-transparent"></div>
                </div>
                <div id="feed-list" class="space-y-8 pb-20">
                    <!-- Postagens serão carregadas aqui -->
                </div>
                </div> <!-- End of max-w-5xl -->
            </div>
        </main>
    </div>
    <script type="module">
        const loadScripts = async () => {
            const timestamp = new Date().getTime();
            const { loadComponents } = await import(`./common-ui.js?v=${timestamp}`);
            const { initFeedPage } = await import(`./feed.js?v=${timestamp}`);
            loadComponents(initFeedPage);
        };

        document.addEventListener('DOMContentLoaded', () => {
            loadScripts();

            // Toggle CTA fields
            document.getElementById('toggle-cta').addEventListener('click', function() {
                const fields = document.getElementById('cta-fields');
                fields.classList.toggle('hidden');
                this.querySelector('i').classList.toggle('fa-plus-circle');
                this.querySelector('i').classList.toggle('fa-minus-circle');
            });

            document.getElementById('post-media').addEventListener('change', function() {
                const fileName = this.files[0] ? this.files[0].name : 'Escolher arquivo...';
                document.getElementById('file-name').textContent = fileName;
            });

            document.querySelectorAll('input[name="media-type"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    if (this.value === 'upload') {
                        document.getElementById('upload-container').classList.remove('hidden');
                        document.getElementById('url-container').classList.add('hidden');
                    } else {
                        document.getElementById('upload-container').classList.add('hidden');
                        document.getElementById('url-container').classList.remove('hidden');
                    }
                });
            });
        });
    </script>
</body>
</html>
