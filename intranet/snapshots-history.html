<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem("theme") || "light";
            if (theme === "dark") {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        })();
        window.tailwind = { config: { darkMode: "class" } };
    </script>    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Permissões de Rede Universais (CSP) para Web e Mobile -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost ws: wss: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; frame-src 'self' https:; connect-src 'self' capacitor://localhost http://localhost ws: wss: https:;">
    
    
    
    
    
    
        
    
    
    <title>Histórico de Snapshots - Kihap Kanban</title>
    <link rel="icon" href="https://kihap.com.br/wp-content/uploads/2021/02/logo-wh.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="log.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#111111] text-gray-900 dark:text-gray-200 transition-colors duration-300">
    <div class="flex h-screen">
        <div id="sidebar-container"></div>
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black/50 z-30 hidden"></div>

        <main id="main-content" class="flex-1 flex flex-col transition-all duration-300 ease-in-out overflow-x-hidden">
            <div id="header-container"></div>

            <div class="flex-grow p-4 md:p-6 lg:p-8 flex flex-col overflow-y-auto custom-scrollbar">
                
                <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                    <div>
                        <h1 id="dashboard-title" class="text-2xl font-bold text-gray-900 dark:text-white">Histórico de Snapshots</h1>
                        <p id="dashboard-subtitle" class="text-gray-500 dark:text-gray-400 text-sm">Todos os registros</p>
                    </div>
                    <a href="analysis.html" class="px-5 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold transition duration-200 active:scale-95 flex items-center gap-2 text-sm shadow-lg shadow-blue-500/10">
                        <i class="fas fa-arrow-left"></i>Voltar para Análise
                    </a>
                </div>

                <!-- Snapshot Log Section -->
                <div id="snapshot-log-container" class="bg-white/70 dark:bg-[#1a1a1a]/70 backdrop-blur-xl border border-gray-100 dark:border-gray-800/50 p-6 rounded-3xl shadow-sm">
                    <div class="flex flex-wrap justify-between items-center gap-4 mb-4">
                        <input type="text" id="snapshot-search" placeholder="Buscar por data..." class="w-full sm:w-auto bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-white rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-yellow-500 focus:outline-none transition">
                    </div>
                    <div class="overflow-hidden rounded-xl border border-gray-150 dark:border-gray-800 shadow-inner">
                        <table class="min-w-full text-left">
                            <thead class="bg-gray-100 dark:bg-gray-800/80 border-b border-gray-150 dark:border-gray-850">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 dark:text-gray-200 uppercase tracking-wider">Data</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 dark:text-gray-200 uppercase tracking-wider">Total Contratos (EVO)</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 dark:text-gray-200 uppercase tracking-wider">Total Alunos Ativos (EVO)</th>
                                </tr>
                            </thead>
                            <tbody id="snapshot-log-body" class="divide-y divide-gray-100 dark:divide-gray-800 bg-white dark:bg-transparent">
                                <!-- Snapshot rows will be injected by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                    <div id="pagination-container" class="flex justify-between items-center mt-4">
                        <!-- Pagination controls will be injected here -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Snapshot Details Modal -->
    <div id="snapshot-modal" class="modal fixed inset-0 z-50 flex justify-center items-start sm:items-center bg-black/60 dark:bg-black/80 backdrop-blur-sm hidden">
        <div class="modal-content bg-white dark:bg-[#1a1a1a] rounded-2xl border border-gray-200 dark:border-white/5 shadow-2xl p-6 w-full max-w-2xl m-4 transform scale-95 overflow-hidden transition-all duration-300">
            <div class="flex justify-between items-center mb-4">
                <h2 id="snapshot-modal-title" class="text-xl font-bold text-gray-900 dark:text-white">Detalhes do Snapshot</h2>
                <button id="close-snapshot-modal-btn" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 w-9 h-9 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 flex items-center justify-center transition active:scale-90">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <div id="snapshot-modal-body" class="space-y-3 text-gray-700 dark:text-gray-300 overflow-y-auto max-h-[60vh] custom-scrollbar">
                <!-- Details will be populated by JS -->
            </div>
            <div class="mt-6 pt-4 border-t border-gray-150 dark:border-gray-800 flex justify-end">
                <button id="delete-snapshot-btn" class="hidden px-5 py-2.5 rounded-xl bg-red-600 hover:bg-red-700 text-white font-bold transition duration-200 shadow-lg shadow-red-600/10 active:scale-95 flex items-center gap-2">
                    <i class="fas fa-trash-alt"></i>Apagar Snapshot
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="snapshots-history.js"></script>
</body>
</html>
