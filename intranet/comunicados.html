<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost ws: wss: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; frame-src 'self' https:; connect-src 'self' capacitor://localhost http://localhost ws: wss: https:;">
    
    <title>Kihap - Comunicados</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="log.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111111;
            color: #e5e7eb;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden">

    <div id="sidebar-container"></div>
    <div id="sidebar-backdrop" class="fixed inset-0 bg-black/50 z-30 hidden"></div>

    <main id="main-content" class="flex-1 flex flex-col h-screen overflow-y-auto">
        <div id="header-container"></div>

        <div class="p-6 max-w-5xl mx-auto w-full space-y-8">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold text-white mb-2">
                        <i class="fas fa-bullhorn text-yellow-500 mr-2"></i> Centro de Comunicados
                    </h1>
                    <p class="text-gray-400">Envie notificações em tempo real para alunos e colaboradores.</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Formulário de Envio -->
                <div class="lg:col-span-7 space-y-6">
                    <div class="bg-[#1a1a1a] rounded-2xl p-6 border border-gray-800 shadow-xl">
                        <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                            <i class="fas fa-paper-plane text-blue-500 text-sm"></i> Novo Comunicado
                        </h2>

                        <form id="notification-form" class="space-y-5">
                            <div>
                                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Destinatários</label>
                                <select id="recipient-type" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-yellow-500 outline-none transition-all">
                                    <option value="all">Todos os Usuários</option>
                                    <option value="unit">Por Unidade</option>
                                    <option value="individual">Aluno Específico</option>
                                </select>
                            </div>

                            <div id="unit-selector" class="hidden animate-fade-in">
                                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Selecione a Unidade</label>
                                <select id="target-unit" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-yellow-500 outline-none">
                                    <!-- Populated via JS -->
                                </select>
                            </div>

                            <div id="student-selector" class="hidden animate-fade-in">
                                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Buscar Aluno (Email ou Nome)</label>
                                <input type="text" id="target-student" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-yellow-500 outline-none" placeholder="Ex: joao@email.com">
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Título</label>
                                    <input type="text" id="notif-title" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-yellow-500 outline-none" placeholder="Ex: Aula Especial">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Tipo</label>
                                    <select id="notif-type" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-yellow-500 outline-none">
                                        <option value="admin">Aviso Geral</option>
                                        <option value="chat">Mensagem / Update</option>
                                        <option value="trello">Tarefa / Demanda</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Mensagem</label>
                                <textarea id="notif-message" required rows="3" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-yellow-500 outline-none" placeholder="Escreva o conteúdo da notificação..."></textarea>
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Link de Destino (Opcional)</label>
                                <input type="text" id="notif-link" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-yellow-500 outline-none" placeholder="Ex: cursos.html">
                            </div>

                            <button type="submit" id="submit-notif" class="w-full py-4 bg-yellow-500 hover:bg-yellow-400 text-black font-bold rounded-xl transition-all shadow-lg shadow-yellow-500/10 flex items-center justify-center gap-2">
                                <i class="fas fa-paper-plane"></i> Enviar Notificação
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Preview e Histórico -->
                <div class="lg:col-span-5 space-y-6">
                    <div class="bg-[#1a1a1a] rounded-2xl border border-gray-800 overflow-hidden shadow-xl">
                        <div class="p-4 bg-gray-800/50 border-b border-gray-700">
                            <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest text-center">Preview em Tempo Real</h3>
                        </div>
                        <div class="p-6 flex justify-center bg-black/20">
                            <!-- Notification Mockup -->
                            <div class="w-full max-w-sm bg-[#222] border border-gray-700 rounded-xl shadow-2xl overflow-hidden flex gap-4 p-4 animate-pulse" id="notif-preview">
                                <div class="flex-shrink-0">
                                    <div class="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center" id="preview-icon-bg">
                                        <i class="fas fa-bullhorn text-black" id="preview-icon"></i>
                                    </div>
                                </div>
                                <div class="flex-1">
                                    <p class="text-sm font-bold text-white mb-1" id="preview-title">Título do Aviso</p>
                                    <p class="text-xs text-gray-400 line-clamp-2 leading-relaxed" id="preview-message">Sua mensagem aparecerá aqui para o usuário final.</p>
                                    <span class="text-[10px] text-gray-600 uppercase mt-2 block font-medium">Agora</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-[#1a1a1a] rounded-2xl border border-gray-800 overflow-hidden">
                        <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Atividade Recente</h3>
                            <button id="refresh-history" class="text-gray-500 hover:text-white transition-colors">
                                <i class="fas fa-sync-alt text-xs"></i>
                            </button>
                        </div>
                        <div id="notifications-history" class="max-h-[300px] overflow-y-auto divide-y divide-gray-800">
                            <!-- JS Populated -->
                            <div class="p-4 text-center text-gray-500 text-sm italic">
                                Carregando histórico...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Alert Modal -->
    <div id="alertModal" class="fixed inset-0 bg-black bg-opacity-70 z-[100] hidden items-center justify-center p-4">
        <div class="bg-[#1a1a1a] rounded-xl shadow-2xl w-full max-w-sm p-6 text-center border border-gray-800">
            <h3 id="alertTitle" class="text-lg font-bold mb-2 text-white">Aviso</h3>
            <p id="alertMessage" class="text-gray-400 mb-6"></p>
            <button id="closeAlertBtn" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-2 rounded-lg transition-colors">Entendido</button>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-70 z-[100] hidden items-center justify-center p-4">
        <div class="bg-[#1a1a1a] rounded-xl shadow-2xl w-full max-w-sm p-6 text-center border border-gray-800">
            <h3 id="confirmTitle" class="text-lg font-bold mb-2 text-white">Confirmar Ação</h3>
            <p id="confirmMessage" class="text-gray-400 mb-6"></p>
            <div class="flex gap-3">
                <button id="cancelConfirmBtn" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 rounded-lg transition-colors">Cancelar</button>
                <button id="confirmActionBtn" class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-2 rounded-lg transition-colors">Confirmar</button>
            </div>
        </div>
    </div>

    <script type="module" src="comunicados.js"></script>
</body>
</html>
