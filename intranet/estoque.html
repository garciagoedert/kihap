<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem("theme") || "light";
            if (theme === "dark") {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        })();
        window.tailwind = { config: { darkMode: "class" } };
    </script>    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Permissões de Rede Universais (CSP) para Web e Mobile -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost ws: wss: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; frame-src 'self' https:; connect-src 'self' capacitor://localhost http://localhost ws: wss: https:;">
    
    
    
    
    
    
        
    
    
    <title>Controle de Estoque - Intranet KIHAP</title>
    <link rel="icon" href="https://kihap.com.br/wp-content/uploads/2021/02/logo-wh.png" type="image/png">
    <link rel="stylesheet" href="log.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#111111] text-gray-900 dark:text-gray-200 transition-colors duration-300">
    <div class="flex h-screen">
        <div id="sidebar-container"></div>
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black/50 z-30 hidden"></div>

        <main id="main-content" class="flex-1 flex flex-col h-screen transition-all duration-300 ease-in-out">
            <div id="header-container"></div>

            <div class="flex-grow p-4 md:p-6 lg:p-8 flex flex-col overflow-y-auto custom-scrollbar">
                <div class="bg-white dark:bg-[#1a1a1a] p-8 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-800 flex-grow flex flex-col transition-all duration-300">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
                        <div>
                            <h1 class="text-3xl font-bold text-gray-900 dark:text-white tracking-tight">Controle de Estoque</h1>
                            <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Gerenciamento centralizado de produtos e insumos.</p>
                        </div>
                        <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                            <div class="relative flex-grow md:flex-grow-0">
                                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                                <input type="text" id="search-input" placeholder="Buscar produto..." class="w-full md:w-64 pl-10 pr-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                            </div>
                            <div class="relative flex-grow md:flex-grow-0">
                                <select id="unit-filter" class="w-full md:w-48 pl-4 pr-10 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none transition-all">
                                    <option value="geral">Visão Geral</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-[10px] pointer-events-none"></i>
                            </div>
                            <button id="refresh-stock" class="w-12 h-12 flex items-center justify-center bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl text-gray-500 dark:text-gray-400 hover:text-blue-500 transition-all">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                            <button id="add-product" class="h-12 px-6 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl shadow-lg shadow-blue-500/20 transition-all flex items-center gap-2">
                                <i class="fas fa-plus text-xs"></i>
                                <span>Adicionar</span>
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="table w-full text-left">
                            <thead>
                                <tr class="bg-gray-50/50 dark:bg-gray-800/30 text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest border-b border-gray-100 dark:border-gray-800">
                                    <th class="p-6">Produto</th>
                                    <th class="p-6">Unidade</th>
                                    <th class="p-6">Preço</th>
                                    <th class="p-6 text-center">Quantidade</th>
                                    <th class="p-6 text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody id="stock-table-body">
                                <!-- Linhas serão inseridas dinamicamente aqui -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="auth.js"></script>
    <script type="module">
        import { loadComponents } from './common-ui.js';
        import { setupEstoquePage } from './estoque.js';

        document.addEventListener('DOMContentLoaded', () => {
            loadComponents(setupEstoquePage);
        });
    </script>

    <!-- Add/Edit Stock Modal -->
    <div id="stock-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-[#1a1a1a] rounded-3xl shadow-2xl w-full max-w-md border border-gray-100 dark:border-gray-800 overflow-hidden animate-fadeIn">
            <div class="flex justify-between items-center p-6 border-b border-gray-50 dark:border-gray-800/50 bg-gray-50/50 dark:bg-gray-800/30">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-50 dark:bg-blue-900/20 rounded-xl flex items-center justify-center text-blue-600 dark:text-blue-400">
                        <i class="fas fa-box text-lg"></i>
                    </div>
                    <h2 id="modal-title" class="text-xl font-bold text-gray-900 dark:text-white tracking-tight">Adicionar Produto</h2>
                </div>
                <button id="close-modal-btn" class="w-10 h-10 flex items-center justify-center rounded-xl text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <div class="p-8">
                <form id="stock-form" class="space-y-6">
                    <input type="hidden" id="stock-id">
                    <div>
                        <label for="product-name" class="block text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-2">Nome do Produto</label>
                        <input type="text" id="product-name" required class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="product-unit" class="block text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-2">Unidade</label>
                            <div class="relative">
                                <select id="product-unit" required class="w-full pl-4 pr-10 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none transition-all text-sm font-medium">
                                    <!-- Options will be populated by JS -->
                                </select>
                                <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-[10px] pointer-events-none"></i>
                            </div>
                        </div>
                        <div>
                            <label for="product-quantity" class="block text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-2">Quantidade</label>
                            <input type="number" id="product-quantity" required class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="product-price" class="block text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-2">Preço (R$)</label>
                            <input type="number" id="product-price" step="0.01" required class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium">
                        </div>
                        <div>
                            <label for="product-status" class="block text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-2">Status</label>
                            <div class="relative">
                                <select id="product-status" required class="w-full pl-4 pr-10 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none transition-all text-sm font-medium">
                                    <option value="Em estoque">Em estoque</option>
                                    <option value="Estoque baixo">Estoque baixo</option>
                                    <option value="Fora de estoque">Fora de estoque</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-[10px] pointer-events-none"></i>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-3 pt-6">
                        <button type="button" id="delete-stock-btn" class="hidden flex-1 px-6 py-4 bg-red-50 dark:bg-red-900/10 text-red-600 dark:text-red-400 hover:bg-red-600 dark:hover:bg-red-500 hover:text-white font-bold rounded-2xl transition-all border border-red-100 dark:border-red-500/20 text-sm">Excluir</button>
                        <button type="submit" id="save-stock-btn" class="flex-1 px-6 py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl shadow-lg shadow-blue-500/20 transition-all text-sm">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
