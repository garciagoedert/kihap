<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem("theme") || "light";
            if (theme === "dark") {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        })();
        window.tailwind = { config: { darkMode: "class" } };
    </script>    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Permissões de Rede Universais (CSP) para Web e Mobile -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost ws: wss: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; frame-src 'self' https:; connect-src 'self' capacitor://localhost http://localhost ws: wss: https:;">
    
    
    
    
    
    
        
    
    
    <title>Kihap - Gerenciar Emblemas</title>
    <link rel="icon" href="https://kihap.com.br/wp-content/uploads/2021/02/logo-wh.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="log.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .badge-card {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .badge-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(251, 191, 36, 0.1), 0 4px 6px -2px rgba(251, 191, 36, 0.05);
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#111111] text-gray-900 dark:text-gray-200 transition-colors duration-300">
    <div class="flex h-screen">
        <div id="sidebar-container"></div>
        
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black/50 z-30 hidden"></div>

        <main id="main-content" class="flex-1 flex flex-col h-screen transition-all duration-300 ease-in-out">
            <div id="header-container"></div>

            <div class="flex-grow p-4 md:p-6 lg:p-8 flex flex-col overflow-y-auto custom-scrollbar">
                <h1 class="text-2xl font-bold mb-6 tracking-tight">Gerenciamento de Emblemas</h1>

                <!-- Formulário para Adicionar Novo Emblema -->
                <div class="glass-panel p-6 md:p-8 rounded-3xl border border-gray-200 dark:border-gray-800 shadow-sm mb-8">
                    <h2 class="text-xl font-bold mb-6 text-gray-900 dark:text-white tracking-tight flex items-center gap-2">
                        <i class="fas fa-shield-halved text-primary"></i> Adicionar Novo Emblema
                    </h2>
                    <form id="add-badge-form" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <label for="badge-name" class="text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest block mb-2">Nome do Emblema</label>
                                <input type="text" id="badge-name" placeholder="Ex: Guerreiro de Elite" required
                                    class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest block mb-2">Imagem do Emblema</label>
                                <div class="flex flex-col gap-3">
                                    <input type="file" id="badge-image" accept="image/*" class="hidden" required>
                                    <button type="button" onclick="document.getElementById('badge-image').click()" 
                                        class="px-4 py-3 bg-primary/10 text-primary border border-primary/20 rounded-xl font-bold text-sm hover:bg-primary hover:text-white transition-all flex items-center justify-center gap-2 w-full">
                                        <i class="fas fa-cloud-upload-alt"></i>
                                        <span>Escolher ícone</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label for="badge-description"
                                class="text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest block mb-2">Descrição da Conquista</label>
                            <textarea id="badge-description" rows="3" placeholder="Descreva o que o aluno precisa fazer para ganhar este emblema..."
                                class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all"></textarea>
                        </div>
                        <div class="flex justify-end">
                            <button type="submit" id="submit-badge-btn"
                                class="bg-primary hover:bg-primary-dark text-white font-bold py-4 px-12 rounded-xl shadow-lg transition-all active:scale-95 uppercase tracking-widest text-xs">
                                Salvar Emblema
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Lista de Emblemas Existentes -->
                <div class="glass-panel p-6 md:p-8 rounded-3xl border border-gray-200 dark:border-gray-800 shadow-sm flex-grow">
                    <h2 class="text-xl font-bold mb-6 text-gray-900 dark:text-white tracking-tight flex items-center gap-2">
                        <i class="fas fa-award text-primary"></i> Emblemas Existentes
                    </h2>
                    <div id="badges-list-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                        <!-- Emblemas serão carregados aqui -->
                        <p class="col-span-full text-center text-gray-400 italic p-12">Carregando emblemas...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="auth.js"></script>
    <script type="module">
        import { loadComponents } from './common-ui.js';
        import { setupGerenciarEmblemasPage } from './gerenciar-emblemas.js';

        document.addEventListener('DOMContentLoaded', () => {
            loadComponents(() => {
                setupGerenciarEmblemasPage();
            });
        });
    </script>
</body>
</html>
