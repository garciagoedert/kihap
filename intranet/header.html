<header
    class="bg-[#1a1a1a]/80 backdrop-blur-sm sticky top-0 z-20 flex items-center justify-between p-4 border-b border-gray-700 flex-shrink-0">
    <div class="flex items-center gap-4">
        <button id="menu-toggle" class="p-2 rounded-md text-gray-300 hover:bg-gray-700" aria-label="Toggle menu">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                </path>
            </svg>
        </button>
        <a href="index.html">
            <img src="/imgs/logo.png" alt="Kihap Logo" class="h-8">
        </a>
    </div>

    <!-- Perfil e Notificações -->
    <div class="flex items-center gap-4 relative">
        <!-- Notificações -->
        <div class="relative">
            <button id="notification-toggle" class="relative p-2 rounded-lg text-gray-400 hover:bg-gray-700/50 hover:text-white transition-all duration-200 focus:outline-none">
                <i class="fas fa-bell text-xl"></i>
                <span id="notification-badge" class="hidden absolute top-1.5 right-1.5 w-4 h-4 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center border-2 border-[#1a1a1a]">0</span>
            </button>

            <!-- Dropdown de Notificações -->
            <div id="notifications-dropdown" class="hidden absolute right-0 mt-2 w-80 sm:w-96 bg-[#1a1a1a] border border-gray-700 rounded-xl shadow-2xl z-50 overflow-hidden transform origin-top-right transition-all duration-200">
                <div class="p-4 border-b border-gray-700 bg-gray-800/30 flex items-center justify-between">
                    <p class="text-xs text-gray-400 font-medium uppercase tracking-wider">Notificações</p>
                    <button id="mark-all-read" class="text-[10px] text-blue-400 hover:text-blue-300 font-bold uppercase tracking-tighter">Limpar tudo</button>
                </div>
                <div id="notifications-list" class="max-h-[400px] overflow-y-auto custom-scrollbar">
                    <!-- Notificações serão inseridas aqui via JS -->
                    <div class="p-8 text-center text-gray-500">
                        <i class="fas fa-bell-slash text-3xl mb-3 block opacity-20"></i>
                        <p class="text-sm">Nenhuma notificação por enquanto</p>
                    </div>
                </div>
                <div class="p-3 border-t border-gray-700 text-center">
                    <a href="#" class="text-xs text-gray-400 hover:text-white transition-colors">Ver todas as notificações</a>
                </div>
            </div>
        </div>

        <!-- Seção do Perfil -->
        <div class="relative">
            <button id="profile-menu-toggle" class="flex items-center gap-3 p-1 rounded-lg hover:bg-gray-700/50 transition-all duration-200 focus:outline-none">
                <div class="flex flex-col items-end hidden sm:flex">
                    <span id="header-user-name" class="text-sm font-bold text-white leading-tight truncate max-w-[150px]">Carregando...</span>
                    <span id="header-user-unit" class="text-[10px] text-gray-400 uppercase tracking-wider font-medium">Kihap</span>
                </div>
                <div class="relative">
                    <img id="header-user-avatar" src="default-profile.svg" alt="Avatar" class="w-10 h-10 rounded-full border-2 border-gray-700 object-cover">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#1a1a1a] rounded-full"></div>
                </div>
                <i class="fas fa-chevron-down text-gray-500 text-xs transition-transform duration-200" id="profile-chevron"></i>
            </button>

            <!-- Menu Dropdown do Perfil -->
            <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-[#1a1a1a] border border-gray-700 rounded-xl shadow-2xl z-50 overflow-hidden transform origin-top-right transition-all duration-200">
                <div class="p-4 border-b border-gray-700 bg-gray-800/30">
                    <p class="text-xs text-gray-400 font-medium uppercase tracking-wider mb-1">Acesso Rápido</p>
                    <p id="dropdown-user-email" class="text-sm text-gray-300 truncate">carregando...</p>
                </div>
                <div class="p-2">
                    <a href="perfil.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-700 hover:text-white transition-colors group">
                        <div class="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center group-hover:bg-blue-500/20">
                            <i class="fas fa-user-circle text-blue-500"></i>
                        </div>
                        <span class="font-medium">Meu Perfil</span>
                    </a>
                    <a href="configuracoes.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-700 hover:text-white transition-colors group admin-only">
                        <div class="w-8 h-8 rounded-lg bg-purple-500/10 flex items-center justify-center group-hover:bg-purple-500/20">
                            <i class="fas fa-cog text-purple-500"></i>
                        </div>
                        <span class="font-medium">Configurações</span>
                    </a>
                    <hr class="my-2 border-gray-700">
                    <button onclick="logout()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-colors group">
                        <div class="w-8 h-8 rounded-lg bg-red-500/10 flex items-center justify-center group-hover:bg-red-500/20">
                            <i class="fas fa-sign-out-alt text-red-500"></i>
                        </div>
                        <span class="font-medium">Sair da Conta</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>
