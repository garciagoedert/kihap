<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem("theme") || "light";
            if (theme === "dark") {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        })();
        window.tailwind = { config: { darkMode: "class" } };
    </script>    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Permissões de Rede Universais (CSP) para Web e Mobile -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost ws: wss: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; frame-src 'self' https:; connect-src 'self' capacitor://localhost http://localhost ws: wss: https:;">
    
    
    
    
    
    
        
    
    
    <title>Player do Curso - Intranet Kihap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="log.css">
    <style>
        #lesson-content-container iframe {
            width: 100%;
            height: 100%;
            aspect-ratio: 16 / 9;
        }
        .module-header i {
            transition: transform 0.3s ease;
        }
        .module-header .fa-chevron-up {
            transform: rotate(180deg);
        }
        
        /* Força a herança de cor do Tailwind sobrepondo estilos inline do editor rico */
        #lesson-description * {
            color: inherit !important;
            background-color: transparent !important;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#111111] text-gray-900 dark:text-gray-200 transition-colors duration-300">
    <div class="flex h-screen">
        <div id="sidebar-container"></div>
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden"></div>
        <main id="main-content" class="flex-1 flex flex-col h-screen overflow-hidden transition-all duration-300 ease-in-out">
            <div id="header-container"></div>
            <div class="p-4 md:p-6 lg:p-8 flex-1 overflow-y-auto custom-scrollbar">
                <div class="flex flex-col lg:flex-row gap-8">
                    <!-- Conteúdo Principal da Aula -->
                    <div class="flex-grow lg:w-3/4 flex flex-col">
                        <div id="lesson-content-container" class="bg-black rounded-2xl mb-6 shadow-xl overflow-hidden border border-gray-800 flex-shrink-0">
                            <!-- Player de vídeo ou conteúdo da aula aqui -->
                        </div>
                        <div class="bg-white/70 dark:bg-[#1a1a1a]/70 backdrop-blur-xl p-6 md:p-10 rounded-3xl border border-gray-100 dark:border-gray-800/50 shadow-sm mt-4">
                            <h1 id="lesson-title" class="text-3xl md:text-4xl font-black tracking-tight text-gray-900 dark:text-white mb-6">Carregando...</h1>
                            <div class="h-px w-full bg-gradient-to-r from-gray-200 dark:from-gray-800 to-transparent mb-8"></div>
                            <div id="lesson-description" class="text-gray-600 dark:text-gray-300 text-base md:text-lg leading-relaxed prose prose-lg dark:prose-invert max-w-none prose-p:mb-6 prose-p:leading-loose"></div>
                        </div>
                    </div>

                    <!-- Lista de Aulas -->
                    <div class="lg:w-1/4 flex-shrink-0">
                        <div class="bg-white/70 dark:bg-[#1a1a1a]/70 backdrop-blur-xl p-6 rounded-2xl border border-gray-100 dark:border-gray-800/50 shadow-sm sticky top-0">
                            <h2 id="course-title-sidebar" class="text-lg font-bold text-gray-900 dark:text-white mb-6 uppercase tracking-widest text-[11px]">Conteúdo do Curso</h2>
                            <div id="modules-list" class="space-y-4 max-h-[calc(100vh-200px)] overflow-y-auto custom-scrollbar pr-2">
                                <!-- Módulos e aulas serão listados aqui -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module">
        import { loadComponents } from './common-ui.js';
        import './player.js';

        document.addEventListener('DOMContentLoaded', () => {
            loadComponents();
        });
    </script>
</body>
</html>
