<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <script>
        (function() {
            const theme = localStorage.getItem("theme") || "light";
            if (theme === "dark") {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        })();
        window.tailwind = { config: { darkMode: "class" } };
    </script>    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Permissões de Rede Universais (CSP) para Web e Mobile -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost ws: wss: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; frame-src 'self' https:; connect-src 'self' capacitor://localhost http://localhost ws: wss: https:;">
    
    
    
    
    
    
        
    
    
    <title>Cursos - Intranet Kihap</title>
    <meta charset="UTF-8">
        
    
    
    <title>Cursos - Intranet Kihap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="log.css">
</head>

<body class="bg-gray-50 dark:bg-[#111111] text-gray-900 dark:text-gray-200 transition-colors duration-300">
    <div class="flex h-screen">
        <div id="sidebar-container"></div>
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden"></div>
        <main id="main-content"
            class="flex-1 flex flex-col h-screen overflow-hidden transition-all duration-300 ease-in-out">
            <div id="header-container"></div>
            <div class="p-4 md:p-6 lg:p-8 flex-1 overflow-y-auto custom-scrollbar">
                
                <!-- Page Header -->
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4 bg-white/70 dark:bg-[#1a1a1a]/70 backdrop-blur-xl p-6 rounded-2xl border border-gray-100 dark:border-gray-800/50 shadow-sm">
                    <div>
                        <h1 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white">Meus Cursos</h1>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 font-medium">Acesse seu conteúdo educacional</p>
                    </div>
                    <a href="course-editor.html" id="add-course-btn"
                        class="hidden bg-primary hover:brightness-110 text-black font-black py-3 px-6 rounded-xl text-xs uppercase tracking-widest shadow-lg shadow-primary/20 transition-all active:scale-95 flex items-center gap-2">
                        <i class="fas fa-plus"></i> Novo Curso
                    </a>
                </div>

                <!-- Skeleton Loader -->
                <div id="course-skeleton" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 animate-pulse">
                    <div class="bg-gray-200 dark:bg-[#1a1a1a] h-72 rounded-2xl w-full border border-gray-100 dark:border-gray-800/30"></div>
                    <div class="bg-gray-200 dark:bg-[#1a1a1a] h-72 rounded-2xl w-full border border-gray-100 dark:border-gray-800/30"></div>
                    <div class="bg-gray-200 dark:bg-[#1a1a1a] h-72 rounded-2xl w-full border border-gray-100 dark:border-gray-800/30"></div>
                    <div class="bg-gray-200 dark:bg-[#1a1a1a] h-72 rounded-2xl w-full border border-gray-100 dark:border-gray-800/30 hidden lg:block"></div>
                </div>

                <!-- Course List (Hidden initially) -->
                <div id="course-list" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Cursos serão carregados aqui -->
                </div>
        </main>
    </div>
    <!-- Subscribers Modal -->
    <div id="subscribers-modal"
        class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white dark:bg-[#1a1a1a] rounded-3xl max-w-4xl w-full p-6 md:p-8 relative flex flex-col max-h-[90vh] border border-gray-200 dark:border-gray-800/80 shadow-2xl transition-all">
            <button id="close-subscribers-modal" class="absolute top-6 right-6 w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-red-500 transition-all">
                <i class="fas fa-times text-lg"></i>
            </button>
            
            <div class="flex items-center gap-3 mb-6 shrink-0">
                <div class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center text-primary">
                    <i class="fas fa-users text-lg"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-900 dark:text-white">Alunos com Acesso: <span id="modal-course-name" class="text-primary"></span></h2>
            </div>

            <!-- Liberar Acesso Section -->
            <div class="flex flex-col sm:flex-row gap-3 mb-6 p-5 bg-gray-50 dark:bg-gray-900/30 rounded-2xl border border-gray-205 dark:border-gray-800/80 shrink-0">
                <div class="flex-1 relative">
                    <label class="block text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Liberar acesso para aluno</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary transition-colors">
                            <i class="fas fa-user-plus text-sm"></i>
                        </div>
                        <select id="select-add-subscriber" class="w-full pl-11 pr-10 py-3 text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-750 rounded-xl outline-none focus:ring-4 focus:ring-primary/5 focus:border-primary transition-all appearance-none cursor-pointer text-gray-800 dark:text-gray-200 font-semibold">
                            <option value="">Carregando lista de alunos...</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-gray-400">
                            <i class="fas fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>
                <button id="btn-grant-access" class="sm:self-end bg-primary hover:brightness-110 text-black font-black py-3 px-6 rounded-xl text-[10px] uppercase tracking-widest shadow-lg shadow-primary/20 transition-all active:scale-95 whitespace-nowrap h-[46px]">
                    Liberar Curso
                </button>
            </div>

            <!-- Table Section -->
            <div class="overflow-y-auto flex-1 custom-scrollbar border border-gray-200 dark:border-gray-800 rounded-2xl">
                <table class="w-full text-left text-gray-800 dark:text-gray-200 border-collapse">
                    <thead>
                        <tr class="bg-gray-50/50 dark:bg-gray-800/30 border-b border-gray-200 dark:border-gray-800">
                            <th class="px-6 py-4 text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Nome</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Email</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Data Início</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="subscribers-list" class="divide-y divide-gray-100 dark:divide-gray-800">
                        <!-- Rows will be added here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { loadComponents } from './common-ui.js';
        import './cursos.js';

        document.addEventListener('DOMContentLoaded', () => {
            loadComponents();
        });
    </script>
</body>

</html>
