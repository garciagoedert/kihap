<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <script>
        (function() {
            const theme = localStorage.getItem("theme") || "light";
            if (theme === "dark") {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        })();
        window.tailwind = { config: { darkMode: "class" } };

    <title>Kihap - Login</title>
    <link rel="icon" href="https://kihap.com.br/wp-content/uploads/2021/02/logo-wh.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class"
        }
    </script>
    <script>
        // Default to light mode unless explicitly set to dark
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --kihap-blue: #014fa4;
            --kihap-blue-dark: #003d80;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100dvh;
        }

        /* Fundo Estático e Leve */
        .threads-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm63 31c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM34 90c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm56-76c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c3.314 0 6-2.686 6-6s-2.686-6-6-6-6 2.686-6 6 2.686 6 6 6zm-45 44c3.314 0 6-2.686 6-6s-2.686-6-6-6-6 2.686-6 6 2.686 6 6 6zm50 35c3.314 0 6-2.686 6-6s-2.686-6-6-6-6 2.686-6 6 2.686 6 6 6zM91 69c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8zM48 20c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8zM80 91c5.523 0 10-4.477 10-10s-4.477-10-10-10-10 4.477-10 10 4.477 10 10 10zM20 52c5.523 0 10-4.477 10-10s-4.477-10-10-10-10 4.477-10 10 4.477 10 10 10z' fill='%23000000' fill-opacity='1' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        .dark .threads-bg {
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm63 31c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM34 90c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm56-76c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c3.314 0 6-2.686 6-6s-2.686-6-6-6-6 2.686-6 6 2.686 6 6 6zm-45 44c3.314 0 6-2.686 6-6s-2.686-6-6-6-6 2.686-6 6 2.686 6 6 6zm50 35c3.314 0 6-2.686 6-6s-2.686-6-6-6-6 2.686-6 6 2.686 6 6 6zM91 69c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8zM48 20c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8zM80 91c5.523 0 10-4.477 10-10s-4.477-10-10-10-10 4.477-10 10 4.477 10 10 10zM20 52c5.523 0 10-4.477 10-10s-4.477-10-10-10-10 4.477-10 10 4.477 10 10 10z' fill='%23ffffff' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        .glass-card {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .dark .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .btn-kihap {
            background-color: var(--kihap-blue);
            transition: background-color 0.2s ease;
        }

        .btn-kihap:active {
            background-color: var(--kihap-blue-dark);
            transform: scale(0.98);
        }

        .input-kihap {
            background: #f3f4f6 !important;
            border: 1px solid #e5e7eb !important;
            color: #111 !important;
        }

        .dark .input-kihap {
            background: rgba(255, 255, 255, 0.06) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        .input-kihap:focus {
            border-color: var(--kihap-blue) !important;
            background: rgba(255, 255, 255, 0.1) !important;
        }

        /* Personagem Mascote Fixo e Mobile-First */
        .mascot-container {
            position: absolute;
            top: -60px;
            right: 10px;
            width: 110px;
            height: 110px;
            z-index: 20;
            pointer-events: none;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
        }

        @media (min-width: 768px) {
            .mascot-container {
                top: -80px;
                right: -20px;
                width: 140px;
                height: 140px;
            }
        }

        /* Efeito de brilho estático */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--kihap-blue);
            filter: blur(120px);
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-[#050505] text-gray-900 dark:text-gray-200 transition-colors duration-300 flex items-center justify-center p-4">
    <div class="threads-bg"></div>
    <div class="glow" style="top: 0; right: 0;"></div>
    <div class="glow" style="bottom: 0; left: 0;"></div>

    <!-- Login Page -->
    <div class="relative w-full max-w-[400px] z-10">
        
        <!-- Mascote Dinâmico porem Fixo (sem flutuação) -->
        <div id="mascot" class="mascot-container">
            <!-- Injetado via JS -->
        </div>

        <div id="login-page" class="glass-card p-8 md:p-10 space-y-8 shadow-2xl relative">
            
            <!-- Kihap Logo -->
            <div class="flex flex-col items-center">
                <a href="/index.html" class="block">
                    <img src="/imgs/logo.png" alt="Kihap Logo" class="h-9 mb-2 invert dark:invert-0">
                </a>
            </div>

            <form id="login-form" class="space-y-5">
                <div class="space-y-1.5">
                    <label for="email" class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Email</label>
                    <input type="email" id="email" required placeholder="seu@email.com"
                        class="input-kihap w-full px-5 py-3.5 text-sm rounded-xl focus:outline-none">
                </div>

                <div class="space-y-1.5">
                    <label for="password" class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Senha</label>
                    <input type="password" id="password" required placeholder="Sua senha"
                        class="input-kihap w-full px-5 py-3.5 text-sm rounded-xl focus:outline-none">
                </div>

                <div class="flex items-center justify-end">
                    <a href="../members/recuperar-senha.html"
                        class="text-[10px] font-bold text-gray-500 hover:text-primary dark:hover:text-white uppercase transition-colors">Esqueceu a senha?</a>
                </div>

                <div id="login-error" class="bg-red-500/10 border border-red-500/20 text-red-500 text-xs py-3 px-4 rounded-xl text-center font-bold hidden">
                    Credenciais incorretas.
                </div>

                <button type="submit"
                    class="btn-kihap w-full py-4 text-white font-extrabold text-sm uppercase tracking-widest rounded-xl shadow-lg">
                    Entrar
                </button>
            </form>

            <div class="pt-6 border-t border-gray-100 dark:border-white/5 text-center">
                <p class="text-[9px] text-gray-600 font-bold uppercase tracking-widest">Área Restrita Kihap</p>
            </div>
        </div>

        <div class="mt-8 text-center">
            <p class="text-[9px] font-bold text-gray-700 uppercase tracking-widest opacity-40">
                &copy; 2026 Kihap Martial Arts
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Lógica para Mascote Aleatório
        document.addEventListener('DOMContentLoaded', () => {
            const mascots = [
                'arara.png', 'borboleta.png', 'fenix.png', 'girafa.png', 
                'jacare.png', 'leao.png', 'macaco.png', 'panda.png'
            ];
            const randomMascot = mascots[Math.floor(Math.random() * mascots.length)];
            const mascotContainer = document.getElementById('mascot');
            
            if (mascotContainer) {
                mascotContainer.innerHTML = `<img src="/imgs/personagens/${randomMascot}" alt="Mascote" class="w-full h-full object-contain">`;
            }
        });
    </script>
    <script src="geral_log.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="login.js"></script>
</body>

</html>
