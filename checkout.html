<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Permissões de Rede Universais (CSP) para Web e Mobile -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost ws: wss: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; frame-src 'self' https:; connect-src 'self' capacitor://localhost http://localhost ws: wss: https:;">
    
    
    
    
    
    
    
    <link rel="icon" href="https://kihap.com.br/wp-content/uploads/2021/02/logo-wh.png" type="image/png">
    <title>Kihap - Checkout</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=1">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased bg-gray-900 text-gray-200">

    <!-- Header -->
    <div id="header-container"></div>

    <main class="py-16">
        <section class="container mx-auto px-6">
            <h1 class="text-4xl md:text-5xl font-black uppercase text-center font-title mb-12">Finalizar Pedido</h1>

            <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12">
                
                <!-- Registration Form -->
                <div class="bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700">
                    <h2 class="text-2xl font-bold mb-8 flex items-center">
                        <span class="bg-yellow-500 text-black w-8 h-8 rounded-full flex items-center justify-center mr-3 text-sm">1</span>
                        Dados do Responsável (Payer)
                    </h2>
                    
                    <form id="checkout-form" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="md:col-span-2">
                                <label for="nome-responsavel" class="block text-sm font-medium text-gray-400 mb-1">Nome Completo (Responsável)</label>
                                <input type="text" id="nome-responsavel" name="nome-responsavel" placeholder="Nome de quem está pagando" class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-yellow-500" required>
                            </div>

                            <div class="md:col-span-2">
                                <label for="email" class="block text-sm font-medium text-gray-400 mb-1">E-mail</label>
                                <input type="email" id="email" name="email" placeholder="seu@email.com" class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-yellow-500" required>
                            </div>
                            
                            <div>
                                <label for="telefone" class="block text-sm font-medium text-gray-400 mb-1">WhatsApp</label>
                                <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-yellow-500" required>
                            </div>
                            
                            <div>
                                <label for="cpf" class="block text-sm font-medium text-gray-400 mb-1">CPF</label>
                                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-yellow-500" required>
                            </div>
                            
                            <div class="md:col-span-2">
                                <label for="unidade" class="block text-sm font-medium text-gray-400 mb-1">Unidade</label>
                                <select id="unidade" name="unidade" class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500" required>
                                    <option value="">Carregando unidades...</option>
                                </select>
                            </div>
                        </div>

                        <!-- Participantes Dinâmicos -->
                        <div id="participants-container" class="space-y-8 pt-8 border-t border-gray-700">
                            <!-- JS will inject participant forms here -->
                        </div>

                        <div id="checkout-error" class="hidden p-4 bg-red-900/30 border border-red-700 text-red-400 rounded-lg text-sm text-center">
                            <!-- Erro aparecerá aqui -->
                        </div>

                        <button type="submit" id="final-pay-btn" class="w-full bg-yellow-500 text-black font-black py-5 px-8 rounded-xl hover:bg-yellow-600 transition text-xl uppercase tracking-wider flex justify-center items-center">
                            <i class="fas fa-check-circle mr-2"></i> Pagar Agora
                        </button>
                    </form>
                </div>

                <!-- Order Summary -->
                <div class="space-y-8">
                    <div class="bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700">
                        <h2 class="text-2xl font-bold mb-8 flex items-center">
                            <span class="bg-yellow-500 text-black w-8 h-8 rounded-full flex items-center justify-center mr-3 text-sm">2</span>
                            Resumo do Pedido
                        </h2>
                        
                        <div id="checkout-summary-items" class="space-y-4 mb-8">
                            <!-- Items set by JS -->
                        </div>

                        <div class="space-y-3 border-t border-gray-700 pt-6">
                            <div class="flex justify-between text-gray-400">
                                <span>Subtotal</span>
                                <span id="summary-subtotal" class="font-semibold text-white">R$ 0,00</span>
                            </div>
                            <div id="discount-row" class="hidden flex justify-between text-green-400">
                                <span>Desconto</span>
                                <span id="summary-discount">- R$ 0,00</span>
                            </div>
                            <div class="flex justify-between items-center pt-4">
                                <span class="text-xl font-bold text-white">Total</span>
                                <span id="summary-total" class="text-3xl font-black text-yellow-500">R$ 0,00</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-gray-800/50 p-6 rounded-xl border border-gray-700 text-center">
                        <p class="text-sm text-gray-500 mb-4">Pagamento processado de forma segura via Mercado Pago</p>
                        <div class="flex justify-center">
                             <img src="https://www.mercadopago.com/org-rc/img/payment-methods/logos/mercadopago/logo-mp.svg" alt="Mercado Pago" class="h-10 opacity-90 transition-all hover:opacity-100">
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <div id="footer-container"></div>

    <script src="js/script.js"></script>
    <script type="module" src="js/checkout.js"></script>
</body>
</html>
