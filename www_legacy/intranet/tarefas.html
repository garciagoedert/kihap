<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem("theme") || "light";
            if (theme === "dark") {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        })();
        window.tailwind = { config: { darkMode: "class" } };
    </script>    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Permissões de Rede Universais (CSP) para Web e Mobile -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost ws: wss: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; frame-src 'self' https:; connect-src 'self' capacitor://localhost http://localhost ws: wss: https:;">
    
    
    
    
    
    
        
    
    
    <link rel="icon" href="https://kihap.com.br/wp-content/uploads/2021/02/logo-wh.png" type="image/png">
    <title>Módulo de Tarefas - CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="log.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            overflow-y: hidden; /* Prevent body scroll */
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#111111] text-gray-900 dark:text-gray-200 transition-colors duration-300">
    <div id="app-container" class="flex h-screen bg-gray-50 dark:bg-[#111111]">
        <div id="sidebar-container"></div>
        
        <!-- Backdrop for mobile sidebar -->
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black/50 z-30 hidden"></div>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 flex flex-col h-screen overflow-hidden transition-all duration-300 ease-in-out">
            <div id="header-container"></div>

            <!-- Page Content -->
            <div class="p-4 md:p-6 lg:p-8 flex flex-col flex-1 min-h-0">
                <div class="flex justify-between items-center mb-6 flex-shrink-0">
                    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Gerenciamento de Tarefas</h1>
                    <button id="create-task-btn" class="bg-primary hover:bg-primary-dark text-black font-bold py-2 px-4 rounded-lg shadow-md transition-all active:scale-95">
                        <i class="fas fa-plus mr-2"></i>Nova Tarefa
                    </button>
                </div>
                
                <!-- Scrollable Content Area -->
                <div class="overflow-y-auto custom-scrollbar flex-1">
                    <div class="bg-white/90 dark:bg-[#1a1a1a]/80 backdrop-blur-sm p-4 rounded-xl border border-gray-200 dark:border-gray-700 shadow-lg mb-6">
                        <div class="flex flex-col md:flex-row items-center gap-4">
                            <div class="relative flex-grow w-full">
                                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input type="text" id="search-input" placeholder="Buscar por título..." class="w-full bg-gray-50 dark:bg-[#111] text-gray-900 dark:text-white border border-gray-200 dark:border-gray-700 rounded-lg py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-primary transition-all">
                            </div>
                            <div class="w-full md:w-auto flex flex-col md:flex-row gap-3">
                                <select id="filter-assignee" title="Filtrar por Responsável" class="bg-gray-50 dark:bg-[#111] text-gray-900 dark:text-white border border-gray-200 dark:border-gray-700 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-primary">
                                    <option value="">Todos os Responsáveis</option>
                                </select>
                                <select id="filter-status" title="Filtrar por Status" class="bg-gray-50 dark:bg-[#111] text-gray-900 dark:text-white border border-gray-200 dark:border-gray-700 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-primary">
                                    <option value="">Todos os Status</option>
                                    <option value="pending">Pendente</option>
                                    <option value="in_progress">Em Progresso</option>
                                </select>
                                <div class="flex items-center gap-2 px-2">
                                    <input type="checkbox" id="show-done-tasks" class="h-4 w-4 rounded border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-primary focus:ring-primary">
                                    <label for="show-done-tasks" class="text-sm font-medium text-gray-600 dark:text-gray-300">Concluídas</label>
                                </div>
                                <select id="filter-priority" title="Filtrar por Prioridade" class="bg-gray-50 dark:bg-[#111] text-gray-900 dark:text-white border border-gray-200 dark:border-gray-700 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-primary">
                                    <option value="">Todas as Prioridades</option>
                                    <option value="low">Baixa</option>
                                    <option value="normal">Normal</option>
                                    <option value="high">Alta</option>
                                    <option value="urgent">Urgente</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white/90 dark:bg-[#1a1a1a]/80 backdrop-blur-sm rounded-xl border border-gray-200 dark:border-gray-700 shadow-lg overflow-hidden">
                        <div class="overflow-x-auto custom-scrollbar">
                            <table class="min-w-full text-sm text-left">
                                <thead class="text-xs text-gray-500 dark:text-gray-400 uppercase bg-gray-50/50 dark:bg-gray-800/50 border-b border-gray-200 dark:border-gray-700">
                                    <tr>
                                        <th scope="col" class="px-6 py-4 font-bold">Título</th>
                                        <th scope="col" class="px-6 py-4 font-bold">Cliente/Vínculo</th>
                                        <th scope="col" class="px-6 py-4 font-bold">Responsável</th>
                                        <th scope="col" class="px-6 py-4 font-bold">Prazo</th>
                                        <th scope="col" class="px-6 py-4 font-bold">Prioridade</th>
                                        <th scope="col" class="px-6 py-4 font-bold">Status</th>
                                        <th scope="col" class="px-6 py-4 font-bold">Criado por</th>
                                    </tr>
                                </thead>
                            <tbody id="tasks-container">
                                <!-- As linhas da tabela de tarefas serão inseridas aqui -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal para Criar/Editar Tarefa -->
    <div id="task-modal" class="hidden fixed inset-0 bg-black/80 z-50 items-center justify-center sm:p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-[#1a1a1a] w-full h-full sm:h-auto sm:rounded-xl shadow-2xl sm:max-w-2xl sm:max-h-[90vh] flex flex-col border border-gray-200 dark:border-gray-700">
            <div class="flex justify-between items-center p-4 border-b border-gray-200 dark:border-gray-700">
                <h2 id="modal-title" class="text-xl font-bold text-gray-900 dark:text-white">Nova Tarefa</h2>
                <button id="close-modal-btn" class="text-gray-400 hover:text-gray-600 dark:hover:text-white text-2xl transition-colors">&times;</button>
            </div>
            <form id="task-form" class="p-6 overflow-y-auto custom-scrollbar space-y-4">
                <input type="hidden" id="task-id">
                <div>
                    <label for="task-title" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Título</label>
                    <input type="text" id="task-title" required class="w-full bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-700 rounded-lg p-2.5 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary transition-all">
                </div>
                <div>
                    <label for="task-description" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Descrição</label>
                    <textarea id="task-description" rows="4" class="w-full bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-700 rounded-lg p-2.5 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary transition-all"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="task-assignee" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Responsável</label>
                        <select id="task-assignee" required class="w-full bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-700 rounded-lg p-2.5 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary transition-all"></select>
                    </div>
                    <div>
                        <label for="task-due-date" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Prazo</label>
                        <input type="datetime-local" id="task-due-date" class="w-full bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-700 rounded-lg p-2.5 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary transition-all">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="task-priority" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Prioridade</label>
                        <select id="task-priority" class="w-full bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-700 rounded-lg p-2.5 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary transition-all">
                            <option value="low">Baixa</option>
                            <option value="normal">Normal</option>
                            <option value="high">Alta</option>
                            <option value="urgent">Urgente</option>
                        </select>
                    </div>
                    <div>
                        <label for="task-status" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Status</label>
                        <select id="task-status" class="w-full bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-700 rounded-lg p-2.5 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary transition-all">
                            <option value="pending">Pendente</option>
                            <option value="in_progress">Em Progresso</option>
                            <option value="done">Concluída</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label for="task-parent-entity" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Vincular a (Cliente, Negócio, etc.)</label>
                    <input type="text" id="task-parent-entity" placeholder="Busque por um cliente ou negócio..." class="w-full bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-700 rounded-lg p-2.5 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary transition-all">
                </div>
                <div class="relative">
                    <label for="task-linked-card-search" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Vincular ao Card (Prospect/Produção)</label>
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="task-linked-card-search" placeholder="Digite para buscar..." class="w-full bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-700 rounded-lg py-2.5 pl-10 pr-4 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary transition-all">
                    </div>
                    <input type="hidden" id="task-linked-card-id">
                    <div id="task-linked-card-results" class="absolute z-10 w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-b-lg mt-1 max-h-48 overflow-y-auto hidden shadow-xl"></div>
                </div>
                <div id="createdByContainer" class="hidden py-2 border-t border-gray-200 dark:border-gray-700">
                    <p class="text-xs text-gray-500 dark:text-gray-400">Criado por: <span id="createdByInfo" class="font-semibold text-gray-700 dark:text-gray-200"></span></p>
                </div>
            </form>
            <div class="flex justify-between items-center mt-auto p-4 border-t border-gray-200 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/30">
                <button type="button" id="delete-task-btn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-6 rounded-lg shadow-md transition-all active:scale-95 hidden">
                    <i class="fas fa-trash mr-2"></i>Apagar
                </button>
                <div class="flex justify-end gap-3 flex-grow">
                    <button type="button" id="cancel-btn" class="bg-white dark:bg-gray-700 text-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 font-semibold py-2 px-6 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 transition-all">Cancelar</button>
                    <button type="submit" form="task-form" class="bg-primary hover:bg-primary-dark text-black font-bold py-2 px-6 rounded-lg shadow-md transition-all active:scale-95">Salvar</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
