<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Permissões de Rede Universais (CSP) para Web e Mobile -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost ws: wss: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; frame-src 'self' https:; connect-src 'self' capacitor://localhost http://localhost ws: wss: https:;">
    
    
    
    
    
    
    
    <link rel="icon" href="https://kihap.com.br/wp-content/uploads/2021/02/logo-wh.png" type="image/png">
    <title>Kihap - Carrinho de Compras</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased bg-gray-900 text-gray-200">

    <!-- Header -->
    <div id="header-container"></div>

    <main class="py-16">
        <section class="container mx-auto px-6">
            <h1 class="text-4xl md:text-5xl font-black uppercase text-center font-title mb-12">Seu Carrinho</h1>

            <div id="cart-empty" class="hidden text-center">
                <p class="text-2xl text-gray-400 mb-8">Seu carrinho está vazio.</p>
                <a href="/store.html" class="bg-yellow-500 text-black font-bold py-3 px-8 rounded-lg hover:bg-yellow-600 transition">Ir para a Loja</a>
            </div>

            <div id="cart-content" class="hidden max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Items list -->
                <div class="lg:col-span-2 space-y-6" id="cart-items-container">
                    <!-- Items rendered by JS -->
                </div>

                <!-- Order Summary -->
                <div class="bg-gray-800 p-8 rounded-lg shadow-xl h-fit sticky top-24">
                    <h2 class="text-2xl font-bold mb-6 border-b border-gray-700 pb-4">Resumo do Pedido</h2>
                    
                    <div class="flex justify-between items-center mb-4 text-gray-400">
                        <span>Subtotal</span>
                        <span id="cart-subtotal" class="font-semibold text-white">R$ 0,00</span>
                    </div>

                    <div class="mb-6 border-b border-gray-700 pb-6">
                        <label for="coupon-code" class="block text-sm font-medium text-gray-400 mb-1">Cupom de Desconto</label>
                        <div class="flex items-center">
                            <input type="text" id="coupon-code" placeholder="Insira seu cupom" class="w-full px-4 py-3 rounded-l-lg bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500">
                            <button type="button" id="apply-coupon-btn" class="bg-yellow-500 text-black font-bold py-3 px-4 rounded-r-lg hover:bg-yellow-600 transition">Aplicar</button>
                        </div>
                        <p id="coupon-status" class="mt-2 text-sm"></p>
                    </div>

                    <div class="flex justify-between items-center mb-8">
                        <span class="text-xl font-bold">Total</span>
                        <span id="cart-total" class="text-3xl font-black text-yellow-500">R$ 0,00</span>
                    </div>

                    <div class="space-y-3">
                        <button id="checkout-btn" class="w-full bg-yellow-500 text-black font-bold py-4 px-8 rounded-lg hover:bg-yellow-600 transition text-lg flex justify-center items-center">
                            <i class="fas fa-lock mr-2"></i> Finalizar Compra
                        </button>
                        <a href="/store.html" class="w-full flex justify-center items-center bg-gray-700 text-white font-bold py-4 px-8 rounded-lg hover:bg-gray-600 transition text-lg">
                            <i class="fas fa-arrow-left mr-2"></i> Continuar Comprando
                        </a>
                    </div>
                    <p id="checkout-status" class="mt-4 text-center text-sm font-semibold"></p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <div id="footer-container"></div>

    <script src="js/script.js"></script>
    <script type="module" src="js/cart.js"></script>
    <script type="module" src="js/cart-page.js"></script>
</body>
</html>
