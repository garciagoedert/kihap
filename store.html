<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://kihap.com.br/wp-content/uploads/2021/02/logo-wh.png" type="image/png">
    <title>Kihap - Loja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased bg-gray-900 text-gray-200">

    <!-- Header -->
    <div id="header-container"></div>

    <main class="py-16">
        <section class="container mx-auto px-6">
            <div id="banner-container" class="mb-12"></div>
            
            <!-- Search Bar -->
            <div class="max-w-2xl mx-auto mb-12">
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-search text-gray-500 group-focus-within:text-yellow-500 transition-colors"></i>
                    </div>
                    <input type="text" id="store-search" 
                        class="block w-full pl-12 pr-4 py-4 bg-gray-800/50 border border-gray-700 rounded-full text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-yellow-500/50 focus:border-yellow-500 transition-all backdrop-blur-sm"
                        placeholder="Buscar produtos...">
                </div>
            </div>

            <h1 class="text-4xl md:text-5xl font-black uppercase text-center font-title mb-12">Nossos Produtos</h1>
            <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Products will be loaded here by JS -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <div id="footer-container"></div>

    <script src="js/script.js"></script>
    <script type="module" src="js/cart.js"></script>
    <script type="module" src="js/store.js"></script>
</body>
</html>
